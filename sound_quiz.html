<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎵 どうぶつのこえクイズ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(160deg, #1a0044 0%, #2d006b 35%, #5b0099 65%, #c2185b 100%);
  min-height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* ---- Stars ---- */
.star {
  position: fixed;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: .15; transform: scale(.8); }
  100% { opacity: .7; transform: scale(1.2); }
}

/* ---- Home button ---- */
.home-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  font-size: .85rem;
  font-weight: 700;
  color: #7b1fa2;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(6px);
  border: 2px solid #ce93d8;
  border-radius: 24px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  transition: transform .15s;
}
.home-btn:active { transform: scale(.94); }

/* ---- Screen base ---- */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 20px;
  position: relative;
  z-index: 2;
}
.screen.active { display: flex; }

/* ==============================
   TITLE SCREEN
============================== */
#titleScreen { gap: 18px; text-align: center; }

.title-unicorn {
  font-size: 5.5rem;
  animation: bounce 1.6s ease-in-out infinite;
  line-height: 1;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

.title-text {
  font-size: 2.5rem;
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 14px rgba(0,0,0,.35);
  letter-spacing: 2px;
  line-height: 1.25;
}
.title-sub {
  font-size: 1rem;
  color: rgba(255,255,255,.72);
  letter-spacing: 1px;
}
.btn-start {
  margin-top: 8px;
  padding: 18px 52px;
  font-size: 1.55rem;
  font-weight: 900;
  color: #6a0080;
  background: linear-gradient(135deg, #ffd54f, #ffb300);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(255,200,50,.45), 0 2px 6px rgba(0,0,0,.2);
  transition: transform .15s, box-shadow .15s;
  letter-spacing: 3px;
}
.btn-start:active { transform: scale(.93); box-shadow: 0 2px 8px rgba(0,0,0,.2); }

/* ==============================
   GAME SCREEN
============================== */
#gameScreen {
  justify-content: flex-start;
  padding: 0;
  height: 100%;
  gap: 0;
}

.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  padding-left: 108px;
  flex-shrink: 0;
}
.q-counter {
  font-size: .95rem;
  font-weight: 700;
  color: rgba(255,255,255,.75);
  letter-spacing: 1px;
}
.score-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,.15);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 1rem;
  font-weight: 700;
  color: white;
}

/* Sound card */
.sound-card {
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,.22);
  border-radius: 22px;
  padding: 16px 20px;
  text-align: center;
  width: calc(100% - 28px);
  margin: 0 14px 10px;
  cursor: pointer;
  transition: transform .15s;
  flex-shrink: 0;
}
.sound-card:active { transform: scale(.97); }

.sound-question {
  font-size: 1.05rem;
  color: rgba(255,255,255,.82);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.speaker-icon {
  font-size: 3.6rem;
  line-height: 1;
  display: block;
  animation: speakerIdle 2.4s ease-in-out infinite;
  cursor: pointer;
}
@keyframes speakerIdle {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(200,160,255,.3)); }
  50% { transform: scale(1.1); filter: drop-shadow(0 0 18px rgba(220,160,255,.65)); }
}
.speaker-icon.playing {
  animation: speakerPlay .35s ease-in-out infinite alternate;
}
@keyframes speakerPlay {
  0% { transform: scale(1.02); filter: drop-shadow(0 0 10px rgba(255,220,100,.5)); }
  100% { transform: scale(1.22); filter: drop-shadow(0 0 26px rgba(255,220,80,1)); }
}
.sound-hint {
  font-size: .78rem;
  color: rgba(255,255,255,.48);
  margin-top: 6px;
}

/* Answer grid */
.answer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: calc(100% - 28px);
  margin: 0 14px;
  flex: 1;
  min-height: 0;
}
.answer-btn {
  background: rgba(255,255,255,.13);
  backdrop-filter: blur(8px);
  border: 3px solid rgba(255,255,255,.2);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: transform .12s, background .15s, border-color .15s;
  padding: 8px 6px;
  min-height: 0;
}
.answer-btn:active { transform: scale(.91); }
.answer-btn .ani-emoji {
  font-size: clamp(2.2rem, 8vw, 3.8rem);
  line-height: 1;
  pointer-events: none;
}
.answer-btn .ani-name {
  font-size: clamp(.85rem, 3.5vw, 1.05rem);
  font-weight: 700;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,.35);
  pointer-events: none;
}

/* answer states */
.answer-btn.correct {
  background: rgba(100,255,150,.3);
  border-color: #69f0ae;
  box-shadow: 0 0 26px rgba(100,255,150,.5);
  animation: correctPop .45s ease;
}
.answer-btn.wrong {
  background: rgba(255,80,80,.3);
  border-color: #ef5350;
  animation: shake .42s ease;
}
@keyframes correctPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.13); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-9px); }
  40% { transform: translateX(9px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Replay button */
.replay-btn {
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.25);
  border-radius: 30px;
  color: rgba(255,255,255,.68);
  font-size: .85rem;
  font-weight: 600;
  padding: 9px 22px;
  cursor: pointer;
  margin: 8px 0 12px;
  flex-shrink: 0;
  transition: background .15s;
}
.replay-btn:active { background: rgba(255,255,255,.2); }

/* ---- Feedback overlay ---- */
.feedback-msg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2.6rem;
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 18px rgba(0,0,0,.45);
  z-index: 300;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  text-align: center;
  line-height: 1.3;
}
.feedback-msg.show { transform: translate(-50%, -50%) scale(1); }

/* ---- Particles ---- */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 280;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.3) rotate(360deg); }
}

/* ==============================
   RESULT SCREEN
============================== */
#resultScreen {
  gap: 16px;
  text-align: center;
  padding: 40px 24px;
}
.result-emoji { font-size: 4.5rem; animation: bounce 1.5s ease-in-out infinite; }
.result-title { font-size: 1.7rem; font-weight: 900; color: white; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
.result-score { font-size: 3.2rem; font-weight: 900; color: #ffd54f; text-shadow: 0 2px 14px rgba(0,0,0,.3); }
.result-stars { font-size: 2.6rem; letter-spacing: 6px; }
.result-comment { font-size: 1.1rem; color: rgba(255,255,255,.85); font-weight: 700; }
.btn-again {
  margin-top: 8px;
  padding: 16px 44px;
  font-size: 1.3rem;
  font-weight: 900;
  color: #6a0080;
  background: linear-gradient(135deg, #ffd54f, #ffb300);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(255,200,50,.45);
  transition: transform .15s;
  letter-spacing: 2px;
}
.btn-again:active { transform: scale(.93); }
</style>
</head>
<body>

<!-- Stars background -->
<div id="starsLayer" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<a href="index.html" class="home-btn">🏰 もどる</a>

<!-- ===== TITLE SCREEN ===== -->
<div class="screen active" id="titleScreen">
  <div class="title-unicorn">🦄</div>
  <div class="title-text">どうぶつの<br>こえクイズ</div>
  <div class="title-sub">🎵 なきごえを きいて どうぶつを あてよう！</div>
  <button class="btn-start" id="btnStart">はじめる！</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <div class="q-counter" id="qCounter">もんだい 1 / 10</div>
    <div class="score-pill">⭐ <span id="scoreDisplay">0</span></div>
  </div>

  <div class="sound-card" id="soundCard">
    <div class="sound-question">なんのなきごえかな？</div>
    <span class="speaker-icon" id="speakerIcon">🔊</span>
    <div class="sound-hint">おしてきいてね！</div>
  </div>

  <div class="answer-grid" id="answerGrid"></div>

  <button class="replay-btn" id="replayBtn">🔊 もう一度きく</button>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div class="screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">10もんおわったよ！</div>
  <div class="result-score" id="resultScore">10 / 10</div>
  <div class="result-stars" id="resultStars">⭐⭐⭐</div>
  <div class="result-comment" id="resultComment">すごい！ぜんぶせいかい！</div>
  <button class="btn-again" id="btnAgain">もう一かい！</button>
</div>

<!-- Feedback popup -->
<div class="feedback-msg" id="feedbackMsg"></div>

<script>
// ============ ANIMALS ============
const ANIMALS = [
  { emoji: '🐶', name: 'いぬ',      sound: 'ワンワン',     color: '#ff9800' },
  { emoji: '🐱', name: 'ねこ',      sound: 'ニャーニャー',  color: '#e91e63' },
  { emoji: '🐄', name: 'うし',      sound: 'モーモー',     color: '#795548' },
  { emoji: '🐷', name: 'ぶた',      sound: 'ブーブー',     color: '#f06292' },
  { emoji: '🐔', name: 'にわとり',  sound: 'コケコッコー',  color: '#ffa000' },
  { emoji: '🐸', name: 'かえる',    sound: 'ケロケロ',     color: '#43a047' },
  { emoji: '🦁', name: 'ライオン',  sound: 'ガオー',       color: '#ef6c00' },
  { emoji: '🐘', name: 'ぞう',      sound: 'パオーン',     color: '#78909c' },
  { emoji: '🐑', name: 'ひつじ',    sound: 'メーメー',     color: '#90a4ae' },
  { emoji: '🦆', name: 'あひる',    sound: 'ガーガー',     color: '#f9a825' },
  { emoji: '🦄', name: 'ユニコーン',sound: 'ヒヒーン',     color: '#ba68c8' },
  { emoji: '🐰', name: 'うさぎ',    sound: 'ぴょんぴょん', color: '#f48fb1' },
  { emoji: '🐻', name: 'くま',      sound: 'グルル',       color: '#8d6e63' },
  { emoji: '🦊', name: 'きつね',    sound: 'コンコン',     color: '#e64a19' },
];

// ============ AUDIO (Web Audio API) ============
let audioCtx = null;

function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSfxCorrect() {
  try {
    const ctx = getACtx();
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
      osc.start(t);
      osc.stop(t + 0.42);
    });
  } catch(e) {}
}

function playSfxWrong() {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(290, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.28);
    gain.gain.setValueAtTime(0.11, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start();
    osc.stop(ctx.currentTime + 0.28);
  } catch(e) {}
}

// ============ SPEECH ============
function speak(animal) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const text = animal.sound + '、' + animal.sound;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.65;
  utt.pitch = 1.2;
  utt.volume = 1.0;
  const icon = document.getElementById('speakerIcon');
  icon.classList.add('playing');
  utt.onend = () => icon.classList.remove('playing');
  utt.onerror = () => icon.classList.remove('playing');
  window.speechSynthesis.speak(utt);
}

// ============ GAME STATE ============
const TOTAL_Q = 10;
let pool = [];
let qIdx = 0;
let score = 0;
let current = null;
let locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  getACtx(); // unlock audio on user gesture
  pool = shuffle(ANIMALS).slice(0, TOTAL_Q);
  qIdx = 0;
  score = 0;
  showScreen('gameScreen');
  nextQuestion();
}

function nextQuestion() {
  current = pool[qIdx];
  locked = false;

  document.getElementById('qCounter').textContent = `もんだい ${qIdx + 1} / ${TOTAL_Q}`;
  document.getElementById('scoreDisplay').textContent = score;

  // 4 choices: correct + 3 wrong
  const wrong = shuffle(ANIMALS.filter(a => a !== current)).slice(0, 3);
  const choices = shuffle([current, ...wrong]);

  const grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  choices.forEach(animal => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.style.borderColor = animal.color + '60';
    btn.innerHTML = `
      <span class="ani-emoji">${animal.emoji}</span>
      <span class="ani-name">${animal.name}</span>
    `;
    btn.addEventListener('click', () => onAnswer(btn, animal));
    grid.appendChild(btn);
  });

  // Auto-play after short delay
  setTimeout(() => speak(current), 350);
}

function onAnswer(btn, chosen) {
  if (locked) return;

  if (chosen === current) {
    // --- CORRECT ---
    locked = true;
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreDisplay').textContent = score;
    playSfxCorrect();
    showFeedback('せいかい！\n🎉');
    spawnParticles();
    setTimeout(() => {
      hideFeedback();
      qIdx++;
      if (qIdx >= TOTAL_Q) {
        showResult();
      } else {
        nextQuestion();
      }
    }, 1500);
  } else {
    // --- WRONG ---
    btn.classList.add('wrong');
    playSfxWrong();
    showFeedback('もう一かい！\n💪');
    setTimeout(() => {
      btn.classList.remove('wrong');
      hideFeedback();
      locked = false;
      speak(current); // replay sound to help
    }, 1050);
  }
}

// ============ UI HELPERS ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showFeedback(msg) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideFeedback() {
  document.getElementById('feedbackMsg').classList.remove('show');
}

// ============ PARTICLES ============
const P_EMOJIS = ['⭐','🌟','✨','🎉','💫','🌈','🎊','💖','🦄','🌸'];
function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = P_EMOJIS[Math.floor(Math.random() * P_EMOJIS.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 90 + Math.random() * 200;
    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      font-size: ${1.1 + Math.random() * 1.1}rem;
      animation-delay: ${Math.random() * .2}s;
    `;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1300);
  }
}

// ============ RESULT ============
function showResult() {
  const pct = score / TOTAL_Q;
  let stars, comment, emoji;
  if (pct === 1) {
    stars = '⭐⭐⭐'; comment = 'ぜんぶせいかい！\nすごすぎる！！'; emoji = '🏆';
  } else if (pct >= 0.7) {
    stars = '⭐⭐'; comment = 'よくできました！'; emoji = '🎉';
  } else {
    stars = '⭐'; comment = 'またちょうせんしよう！'; emoji = '🦄';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = `${TOTAL_Q}もんおわったよ！`;
  document.getElementById('resultScore').textContent = `${score} / ${TOTAL_Q}`;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultComment').textContent = comment;
  showScreen('resultScreen');
  spawnParticles();
  setTimeout(spawnParticles, 600);
}

// ============ EVENTS ============
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnAgain').addEventListener('click', startGame);
document.getElementById('soundCard').addEventListener('click', () => { if (current) speak(current); });
document.getElementById('replayBtn').addEventListener('click', () => { if (current) speak(current); });

// ============ STARS ============
const sl = document.getElementById('starsLayer');
for (let i = 0; i < 50; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = 1.5 + Math.random() * 2.5;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}vw;
    top:${Math.random()*60}vh;
    animation-delay:${Math.random()*3}s;
    animation-duration:${1.5+Math.random()*2}s;
  `;
  sl.appendChild(s);
}
</script>
</body>
</html>
