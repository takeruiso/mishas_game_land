<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🥚 ユニコーンのたまごわり 🦄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(160deg, #1a0044 0%, #5b0099 50%, #ff6ec7 100%);
  }

  /* Stars */
  .star {
    position: fixed;
    border-radius: 50%;
    background: white;
    pointer-events: none;
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: .15; transform: scale(.7); }
    to   { opacity: .9;  transform: scale(1.3); }
  }

  /* Home button */
  .home-btn {
    position: fixed;
    top: 12px; left: 12px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    font-size: .82rem;
    font-weight: 700;
    color: #7b1fa2;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(6px);
    border: 2px solid #ce93d8;
    border-radius: 24px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    transition: transform .15s;
  }
  .home-btn:hover { transform: scale(1.06); }

  /* HUD */
  #hud {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  #title {
    color: white;
    font-size: clamp(1rem, 3.5vw, 1.6rem);
    font-weight: 900;
    text-shadow: 0 2px 12px rgba(0,0,0,.5);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  #progress-wrap {
    width: min(70vw, 380px);
    height: 14px;
    background: rgba(255,255,255,.2);
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,.3);
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6ec7, #ffd54f, #69f0ae);
    border-radius: 10px;
    transition: width .4s ease;
  }

  /* Play field — eggs live here */
  #field {
    position: fixed;
    inset: 0;
    pointer-events: none; /* eggs handle their own events */
  }

  /* Each egg wrapper */
  .egg-wrap {
    position: absolute;
    pointer-events: all;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    /* size set by JS */
  }

  .egg-wrap svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,.35));
    transition: transform .12s;
  }
  .egg-wrap:active svg { transform: scale(.88); }

  /* crack */
  .crack { opacity: 0; transition: opacity .2s; }
  .egg-wrap.cracked .crack { opacity: 1; }

  /* broken → hide */
  .egg-wrap.broken { visibility: hidden; pointer-events: none; }

  /* stopped wobble: gentle idle bob via CSS (applied after JS stops) */
  @keyframes idleBob {
    from { transform: translateY(0px) rotate(-2deg); }
    to   { transform: translateY(-8px) rotate(2deg); }
  }
  .egg-wrap.stopped {
    animation: idleBob 1.8s ease-in-out infinite alternate;
  }
  .egg-wrap.cracked.stopped {
    animation: idleBob 1.4s ease-in-out infinite alternate;
  }

  /* Reveal popup */
  .reveal {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    opacity: 0;
    transform: scale(0) rotate(-20deg);
    pointer-events: none;
    transition: opacity .35s, transform .35s;
  }
  .reveal.show { opacity: 1; transform: scale(1) rotate(0deg); }
  .reveal span.name {
    font-size: .6rem;
    color: white;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.4rem;
    animation: particleFly .9s ease-out forwards;
    z-index: 200;
  }
  @keyframes particleFly {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* Finale overlay */
  #finale {
    position: fixed;
    inset: 0;
    background: rgba(10,0,50,.85);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s;
  }
  #finale.show { opacity: 1; pointer-events: all; }
  #finale .big-emoji {
    font-size: clamp(4rem, 15vw, 7rem);
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-18px); }
  }
  #finale h2 {
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    font-weight: 900;
    color: white;
    text-align: center;
    text-shadow: 0 2px 16px #ff6ec7;
    letter-spacing: 2px;
    line-height: 1.4;
  }
  #restart-btn {
    padding: 14px 40px;
    font-size: 1.2rem;
    font-weight: 800;
    color: #7b1fa2;
    background: linear-gradient(135deg, #fff, #fce4ec);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,110,199,.5);
    transition: transform .15s;
    letter-spacing: 1px;
  }
  #restart-btn:hover { transform: scale(1.07); }
  #restart-btn:active { transform: scale(.97); }
</style>
</head>
<body>

<a class="home-btn" href="index.html">🏠 もどる</a>

<div id="hud">
  <div id="title">🥚 ユニコーンのたまごわり 🦄</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
</div>

<div id="field"></div>

<div id="finale">
  <div class="big-emoji">🦄✨🌈</div>
  <h2>すごい！<br>ぜんぶ わったよ！</h2>
  <button id="restart-btn" onclick="restartGame()">もういちど あそぶ！</button>
</div>

<script>
// ---- Stars ----
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 3 + 1;
  Object.assign(s.style, {
    width: sz + 'px', height: sz + 'px',
    left: Math.random() * 100 + 'vw',
    top:  Math.random() * 100 + 'vh',
    animationDelay: Math.random() * 3 + 's',
    animationDuration: (1.5 + Math.random() * 2) + 's',
  });
  document.body.appendChild(s);
}

// ---- Egg data ----
const EGGS = [
  { color: '#ff80ab', shine: '#ffcdd2', unicorn: '🦄', name: 'ももいろ' },
  { color: '#ea80fc', shine: '#f3e5f5', unicorn: '🌟', name: 'むらさき' },
  { color: '#82b1ff', shine: '#e3f2fd', unicorn: '🔵', name: 'あおいろ' },
  { color: '#69f0ae', shine: '#e8f5e9', unicorn: '🌿', name: 'みどり'   },
  { color: '#ffd740', shine: '#fffde7', unicorn: '⭐', name: 'きいろ'   },
  { color: '#ff6e40', shine: '#fbe9e7', unicorn: '🔥', name: 'オレンジ' },
  { color: '#84ffff', shine: '#e0f7fa', unicorn: '❄️', name: 'みずいろ' },
  { color: '#ffffff', shine: '#f5f5f5', unicorn: '🌈', name: 'しろ'     },
  { color: '#f06292', shine: '#fce4ec', unicorn: '💖', name: 'ピンク'   },
  { color: '#7c4dff', shine: '#ede7f6', unicorn: '🔮', name: 'あい'     },
  { color: '#ffab40', shine: '#fff8e1', unicorn: '🌙', name: 'こがね'   },
  { color: '#40c4ff', shine: '#e1f5fe', unicorn: '💎', name: 'サファイア' },
];

const PARTICLES = ['✨','⭐','🌟','💫','🌸','🎀','🦋','🍭'];
let broken = 0;
const total = EGGS.length;

// ---- SVG ----
function makeEggSVG(color, shine) {
  const id = 'eg' + color.replace('#','');
  return `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="${id}" cx="38%" cy="30%" r="65%">
        <stop offset="0%" stop-color="${shine}"/>
        <stop offset="100%" stop-color="${color}"/>
      </radialGradient>
    </defs>
    <ellipse cx="40" cy="56" rx="32" ry="42" fill="url(#${id})"/>
    <ellipse cx="28" cy="36" rx="9" ry="14" fill="white" opacity=".35" transform="rotate(-20 28 36)"/>
    <g class="crack" stroke="#9c4040" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".7">
      <polyline points="40,30 36,42 44,50 38,62"/>
      <polyline points="44,50 52,48"/>
      <polyline points="36,42 28,44"/>
    </g>
    <text x="50" y="28" font-size="10" opacity=".5">✦</text>
    <text x="18" y="70" font-size="7"  opacity=".4">✦</text>
    <text x="55" y="72" font-size="8"  opacity=".35">✦</text>
  </svg>`;
}

// ---- Physics state ----
// Each entry: { el, x, y, vx, vy, w, h, angle, av, stopAt, moving }
let actors = [];
let rafId  = null;

function buildGame() {
  broken = 0;
  updateProgress();
  actors = [];
  if (rafId) cancelAnimationFrame(rafId);

  const field = document.getElementById('field');
  field.innerHTML = '';

  const VW = window.innerWidth;
  const VH = window.innerHeight;
  // Egg size: fit 12 eggs comfortably
  const EGG_W = Math.min(Math.floor(VW / 6.5), 90);
  const EGG_H = Math.round(EGG_W * 1.33);
  const HUD_H = 90; // leave room for HUD at top

  EGGS.forEach((egg, i) => {
    // wrapper
    const wrap = document.createElement('div');
    wrap.className = 'egg-wrap';
    wrap.style.width  = EGG_W + 'px';
    wrap.style.height = EGG_H + 'px';
    wrap.innerHTML = makeEggSVG(egg.color, egg.shine);
    wrap.dataset.state = 'whole';

    // reveal
    const rev = document.createElement('div');
    rev.className = 'reveal';
    rev.innerHTML = `<span>${egg.unicorn}</span><span class="name">${egg.name}</span>`;
    wrap.appendChild(rev);

    // events
    wrap.addEventListener('click',      () => tapEgg(wrap, egg, i));
    wrap.addEventListener('touchstart', e => { e.preventDefault(); tapEgg(wrap, egg, i); }, { passive: false });

    field.appendChild(wrap);

    // random start position (avoid center clump)
    const cols = 4, rows = 3;
    const col = i % cols, row = Math.floor(i / cols);
    const cellW = (VW - EGG_W) / cols;
    const cellH = (VH - HUD_H - EGG_H) / rows;
    const startX = col * cellW + Math.random() * cellW * 0.6;
    const startY = HUD_H + row * cellH + Math.random() * cellH * 0.5;

    // random velocity
    const speed = 1.2 + Math.random() * 2.0;
    const angle = Math.random() * Math.PI * 2;

    // each egg moves for a different duration (3–6 s)
    const stopAt = performance.now() + 3000 + Math.random() * 3000;

    actors.push({
      el: wrap,
      x: startX, y: startY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: EGG_W, h: EGG_H,
      angle: (Math.random() - 0.5) * 20, // visual tilt degrees
      av: (Math.random() - 0.5) * 1.2,   // angular velocity deg/frame
      stopAt,
      moving: true,
    });

    wrap.style.left = startX + 'px';
    wrap.style.top  = startY + 'px';
    wrap.style.transform = `rotate(${actors[actors.length-1].angle}deg)`;
  });

  loop(performance.now());
}

// ---- Animation loop ----
function loop(now) {
  const VW = window.innerWidth;
  const VH = window.innerHeight;
  let anyMoving = false;

  actors.forEach(a => {
    if (a.el.dataset.state === 'broken') return;
    if (!a.moving) return;

    anyMoving = true;

    // decelerate after stopAt
    if (now >= a.stopAt) {
      a.vx *= 0.90;
      a.vy *= 0.90;
      a.av *= 0.88;
      if (Math.abs(a.vx) < 0.05 && Math.abs(a.vy) < 0.05) {
        a.moving = false;
        a.vx = 0; a.vy = 0; a.av = 0;
        a.el.classList.add('stopped');
        return;
      }
    }

    // move
    a.x += a.vx;
    a.y += a.vy;
    a.angle += a.av;

    // bounce off walls
    if (a.x < 0)          { a.x = 0;          a.vx = Math.abs(a.vx); a.av *= -0.7; }
    if (a.x > VW - a.w)   { a.x = VW - a.w;   a.vx = -Math.abs(a.vx); a.av *= -0.7; }
    if (a.y < 0)           { a.y = 0;          a.vy = Math.abs(a.vy); }
    if (a.y > VH - a.h)   { a.y = VH - a.h;   a.vy = -Math.abs(a.vy); }

    a.el.style.left      = a.x + 'px';
    a.el.style.top       = a.y + 'px';
    a.el.style.transform = `rotate(${a.angle}deg)`;
  });

  if (anyMoving) {
    rafId = requestAnimationFrame(loop);
  } else {
    rafId = null;
  }
}

// ---- Tap ----
function tapEgg(wrap, egg, idx) {
  if (wrap.dataset.state === 'whole') {
    wrap.dataset.state = 'cracked';
    wrap.classList.add('cracked');
    // shake in place
    const a = actors[idx];
    if (a) { a.vx = (Math.random()-0.5)*3; a.vy = -2; a.moving = true; a.stopAt = performance.now() + 400; }
    if (!rafId) rafId = requestAnimationFrame(loop);
    spawnParticlesAt(wrap, ['💥','✨'], 4);
    playClick(220, .08);
  } else if (wrap.dataset.state === 'cracked') {
    wrap.dataset.state = 'broken';
    wrap.classList.remove('stopped');
    wrap.classList.add('broken');
    spawnParticlesAt(wrap, PARTICLES, 8);
    playBreak();
    wrap.querySelector('.reveal').classList.add('show');
    broken++;
    updateProgress();
    if (broken === total) setTimeout(showFinale, 900);
  }
}

// ---- Progress ----
function updateProgress() {
  document.getElementById('progress-bar').style.width = (broken / total * 100) + '%';
}

// ---- Particles ----
function spawnParticlesAt(el, icons, count) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = icons[Math.floor(Math.random() * icons.length)];
    const ang = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    p.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.animationDuration = (.6 + Math.random() * .5) + 's';
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ---- Sound ----
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playClick(freq, gain) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .18);
    osc.start(); osc.stop(ac.currentTime + .18);
  } catch(e) {}
}
function playBreak() {
  try {
    const ac = getAudio();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine';
      osc.connect(g); g.connect(ac.destination);
      osc.frequency.setValueAtTime(f, ac.currentTime + i * .07);
      g.gain.setValueAtTime(.12, ac.currentTime + i * .07);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + i * .07 + .3);
      osc.start(ac.currentTime + i * .07);
      osc.stop(ac.currentTime + i * .07 + .3);
    });
  } catch(e) {}
}

// ---- Finale ----
function showFinale() {
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const fake = { getBoundingClientRect: () => ({
        left: Math.random() * window.innerWidth,
        top:  Math.random() * window.innerHeight * .6,
        width: 0, height: 0
      })};
      spawnParticlesAt(fake, ['🦄','🌈','✨','⭐','🌟','💖','🎉','🎀'], 3);
    }, i * 60);
  }
  try {
    const ac = getAudio();
    [523,659,784,1047,1175,1047,1175,1319].forEach((f, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine';
      osc.connect(g); g.connect(ac.destination);
      osc.frequency.setValueAtTime(f, ac.currentTime + i * .11);
      g.gain.setValueAtTime(.15, ac.currentTime + i * .11);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + i * .11 + .25);
      osc.start(ac.currentTime + i * .11);
      osc.stop(ac.currentTime + i * .11 + .25);
    });
  } catch(e) {}
  document.getElementById('finale').classList.add('show');
}

function restartGame() {
  document.getElementById('finale').classList.remove('show');
  buildGame();
}

// ---- Init ----
buildGame();
</script>
</body>
</html>
