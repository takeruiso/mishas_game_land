<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🥚 ユニコーンのたまごわり 🦄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(160deg, #1a0044 0%, #5b0099 50%, #ff6ec7 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Stars */
  .star {
    position: fixed;
    border-radius: 50%;
    background: white;
    pointer-events: none;
    animation: twinkle 2s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: .15; transform: scale(.7); }
    to   { opacity: .9;  transform: scale(1.3); }
  }

  .home-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    font-size: .82rem;
    font-weight: 700;
    color: #7b1fa2;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(6px);
    border: 2px solid #ce93d8;
    border-radius: 24px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    transition: transform .15s;
  }
  .home-btn:hover { transform: scale(1.06); }

  /* Title */
  #title {
    color: white;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    text-shadow: 0 2px 12px rgba(0,0,0,.4);
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-align: center;
  }

  /* Progress */
  #progress-wrap {
    width: min(90vw, 500px);
    height: 16px;
    background: rgba(255,255,255,.2);
    border-radius: 10px;
    margin-bottom: 18px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,.3);
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6ec7, #ffd54f, #69f0ae);
    border-radius: 10px;
    transition: width .4s ease;
  }

  /* Egg grid */
  #egg-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    width: min(92vw, 540px);
  }

  @media (max-width: 420px) {
    #egg-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
  }

  /* Egg button */
  .egg-btn {
    aspect-ratio: 3/4;
    position: relative;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    animation: eggFloat 2.4s ease-in-out infinite alternate;
  }
  @keyframes eggFloat {
    from { transform: translateY(0px) rotate(-3deg); }
    to   { transform: translateY(-12px) rotate(3deg); }
  }

  .egg-btn svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
    transition: transform .15s;
  }
  .egg-btn:active svg { transform: scale(.92); }
  /* タップ中はふわふわ止める */
  .egg-btn:active { animation-play-state: paused; }

  /* Crack lines (hidden by default) */
  .crack { opacity: 0; transition: opacity .2s; }
  .egg-btn.cracked .crack { opacity: 1; }

  /* Broken egg = hide */
  .egg-btn.broken { visibility: hidden; pointer-events: none; animation: none; }
  /* ひびが入ったらぷるぷる震える */
  .egg-btn.cracked { animation: eggShake .15s ease-in-out 3, eggFloat 2.4s ease-in-out infinite alternate 0.45s; }
  @keyframes eggShake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-5px) rotate(-4deg); }
    75%     { transform: translateX(5px)  rotate(4deg);  }
  }

  /* Unicorn reveal popup */
  .reveal {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    opacity: 0;
    transform: scale(0) rotate(-20deg);
    pointer-events: none;
    transition: opacity .35s, transform .35s;
  }
  .reveal.show {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  .reveal span.name {
    font-size: .65rem;
    color: white;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Sparkle particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.4rem;
    animation: particleFly .9s ease-out forwards;
    z-index: 200;
  }
  @keyframes particleFly {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* Finale overlay */
  #finale {
    position: fixed;
    inset: 0;
    background: rgba(10,0,50,.85);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s;
  }
  #finale.show { opacity: 1; pointer-events: all; }

  #finale .big-emoji {
    font-size: clamp(4rem, 15vw, 7rem);
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-18px); }
  }

  #finale h2 {
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    font-weight: 900;
    color: white;
    text-align: center;
    text-shadow: 0 2px 16px #ff6ec7;
    letter-spacing: 2px;
    line-height: 1.4;
  }

  #restart-btn {
    padding: 14px 40px;
    font-size: 1.2rem;
    font-weight: 800;
    color: #7b1fa2;
    background: linear-gradient(135deg, #fff, #fce4ec);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,110,199,.5);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: 1px;
  }
  #restart-btn:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(255,110,199,.7); }
  #restart-btn:active { transform: scale(.97); }
</style>
</head>
<body>

<a class="home-btn" href="index.html">🏠 もどる</a>

<!-- Stars injected by JS -->

<div id="title">🥚 ユニコーンのたまごわり 🦄</div>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="egg-grid"></div>

<div id="finale">
  <div class="big-emoji">🦄✨🌈</div>
  <h2>すごい！<br>ぜんぶ わったよ！</h2>
  <button id="restart-btn" onclick="restartGame()">もういちど あそぶ！</button>
</div>

<script>
// ---- Stars ----
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 3 + 1;
  Object.assign(s.style, {
    width: sz + 'px', height: sz + 'px',
    left: Math.random() * 100 + 'vw',
    top:  Math.random() * 100 + 'vh',
    animationDelay: Math.random() * 3 + 's',
    animationDuration: (1.5 + Math.random() * 2) + 's',
  });
  document.body.appendChild(s);
}

// ---- Egg data ----
const EGGS = [
  { color: '#ff80ab', shine: '#ffcdd2', unicorn: '🦄', name: 'ももいろ' },
  { color: '#ea80fc', shine: '#f3e5f5', unicorn: '🌟', name: 'むらさき' },
  { color: '#82b1ff', shine: '#e3f2fd', unicorn: '🔵', name: 'あおいろ' },
  { color: '#69f0ae', shine: '#e8f5e9', unicorn: '🌿', name: 'みどり'   },
  { color: '#ffd740', shine: '#fffde7', unicorn: '⭐', name: 'きいろ'   },
  { color: '#ff6e40', shine: '#fbe9e7', unicorn: '🔥', name: 'オレンジ' },
  { color: '#84ffff', shine: '#e0f7fa', unicorn: '❄️', name: 'みずいろ' },
  { color: '#ffffff', shine: '#f5f5f5', unicorn: '🌈', name: 'しろ'     },
  { color: '#f06292', shine: '#fce4ec', unicorn: '💖', name: 'ピンク'   },
  { color: '#7c4dff', shine: '#ede7f6', unicorn: '🔮', name: 'あい'     },
  { color: '#ffab40', shine: '#fff8e1', unicorn: '🌙', name: 'こがね'   },
  { color: '#40c4ff', shine: '#e1f5fe', unicorn: '💎', name: 'サファイア' },
];

const PARTICLES = ['✨','⭐','🌟','💫','🌸','🎀','🦋','🍭'];
let broken = 0;
const total = EGGS.length;

// ---- Build SVG egg ----
function makeEggSVG(color, shine) {
  return `
  <svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="eg${color.replace('#','')}" cx="38%" cy="30%" r="65%">
        <stop offset="0%"   stop-color="${shine}"/>
        <stop offset="100%" stop-color="${color}"/>
      </radialGradient>
    </defs>
    <!-- Egg body -->
    <ellipse cx="40" cy="56" rx="32" ry="42" fill="url(#eg${color.replace('#','')})"/>
    <!-- Shine -->
    <ellipse cx="28" cy="36" rx="9" ry="14" fill="white" opacity=".35" transform="rotate(-20 28 36)"/>
    <!-- Crack lines (hidden until cracked) -->
    <g class="crack" stroke="#9c4040" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".7">
      <polyline points="40,30 36,42 44,50 38,62"/>
      <polyline points="44,50 52,48"/>
      <polyline points="36,42 28,44"/>
    </g>
    <!-- Star sparkles on egg -->
    <text x="50" y="28" font-size="10" opacity=".5">✦</text>
    <text x="18" y="70" font-size="7"  opacity=".4">✦</text>
    <text x="55" y="72" font-size="8"  opacity=".35">✦</text>
  </svg>`;
}

// ---- Build grid ----
function buildGrid() {
  broken = 0;
  updateProgress();
  const grid = document.getElementById('egg-grid');
  grid.innerHTML = '';

  EGGS.forEach((egg, i) => {
    const cell = document.createElement('div');
    cell.style.position = 'relative';

    const btn = document.createElement('button');
    btn.className = 'egg-btn';
    btn.dataset.state = 'whole'; // whole → cracked → broken
    btn.innerHTML = makeEggSVG(egg.color, egg.shine);
    // 各たまごのアニメーションタイミングをずらす
    const delay = -(i * 0.37 % 2.4);
    const dur   = 1.8 + (i % 4) * 0.22;
    btn.style.animationDelay    = delay + 's';
    btn.style.animationDuration = dur + 's';
    btn.addEventListener('click', () => tapEgg(btn, egg, cell));
    btn.addEventListener('touchstart', e => { e.preventDefault(); tapEgg(btn, egg, cell); }, { passive: false });

    // Reveal layer
    const rev = document.createElement('div');
    rev.className = 'reveal';
    rev.innerHTML = `<span>${egg.unicorn}</span><span class="name">${egg.name}</span>`;

    cell.appendChild(btn);
    cell.appendChild(rev);
    grid.appendChild(cell);
  });
}

// ---- Tap logic ----
function tapEgg(btn, egg, cell) {
  if (btn.dataset.state === 'whole') {
    // First tap → crack
    btn.classList.add('cracked');
    btn.dataset.state = 'cracked';
    spawnParticles(btn, ['💥','✨'], 4);
    playClick(220, .08);
  } else if (btn.dataset.state === 'cracked') {
    // Second tap → break
    btn.dataset.state = 'broken';
    btn.classList.add('broken');
    spawnParticles(btn, PARTICLES, 8);
    playBreak(egg.color);
    // Show reveal
    const rev = cell.querySelector('.reveal');
    rev.classList.add('show');
    broken++;
    updateProgress();
    if (broken === total) {
      setTimeout(showFinale, 900);
    }
  }
}

// ---- Progress ----
function updateProgress() {
  document.getElementById('progress-bar').style.width = (broken / total * 100) + '%';
}

// ---- Particles ----
function spawnParticles(btn, icons, count) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = icons[Math.floor(Math.random() * icons.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * 80;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.animationDuration = (.6 + Math.random() * .5) + 's';
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ---- Sound (Web Audio API) ----
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playClick(freq, gain) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .18);
    osc.start(); osc.stop(ac.currentTime + .18);
  } catch(e) {}
}
function playBreak() {
  try {
    const ac = getAudio();
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((f, i) => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = 'sine';
      osc.connect(g); g.connect(ac.destination);
      osc.frequency.setValueAtTime(f, ac.currentTime + i * .07);
      g.gain.setValueAtTime(.12, ac.currentTime + i * .07);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + i * .07 + .3);
      osc.start(ac.currentTime + i * .07);
      osc.stop(ac.currentTime + i * .07 + .3);
    });
  } catch(e) {}
}

// ---- Finale ----
function showFinale() {
  // Big confetti burst
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const fake = { getBoundingClientRect: () => ({
        left: Math.random() * window.innerWidth,
        top:  Math.random() * window.innerHeight * .6,
        width: 0, height: 0
      })};
      spawnParticles(fake, ['🦄','🌈','✨','⭐','🌟','💖','🎉','🎀'], 3);
    }, i * 60);
  }
  // Play fanfare
  try {
    const ac = getAudio();
    const fanfare = [523,659,784,1047,1175,1047,1175,1319];
    fanfare.forEach((f, i) => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = 'sine';
      osc.connect(g); g.connect(ac.destination);
      osc.frequency.setValueAtTime(f, ac.currentTime + i * .11);
      g.gain.setValueAtTime(.15, ac.currentTime + i * .11);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + i * .11 + .25);
      osc.start(ac.currentTime + i * .11);
      osc.stop(ac.currentTime + i * .11 + .25);
    });
  } catch(e) {}
  document.getElementById('finale').classList.add('show');
}

function restartGame() {
  document.getElementById('finale').classList.remove('show');
  buildGrid();
}

// ---- Init ----
buildGrid();
</script>
</body>
</html>
