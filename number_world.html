<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧮 かずのせかい</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(160deg, #001a33 0%, #003366 35%, #0066aa 65%, #00bcd4 100%);
  min-height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* ---- Stars ---- */
.star {
  position: fixed;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: .15; transform: scale(.8); }
  100% { opacity: .7; transform: scale(1.2); }
}

/* ---- Home button ---- */
.home-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 14px;
  font-size: .85rem;
  font-weight: 700;
  color: #01579b;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(6px);
  border: 2px solid #81d4fa;
  border-radius: 24px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  transition: transform .15s;
}
.home-btn:active { transform: scale(.94); }

/* ---- Screen base ---- */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 20px;
  position: relative;
  z-index: 2;
}
.screen.active { display: flex; }

/* ==============================
   TITLE SCREEN
============================== */
#titleScreen { gap: 18px; text-align: center; }

.title-emoji {
  font-size: 5.5rem;
  animation: bounce 1.6s ease-in-out infinite;
  line-height: 1;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}
.title-text {
  font-size: 2.6rem;
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 14px rgba(0,0,0,.35);
  letter-spacing: 2px;
  line-height: 1.25;
}
.title-sub {
  font-size: 1rem;
  color: rgba(255,255,255,.75);
  letter-spacing: 1px;
}

/* Level selector */
.level-label {
  font-size: .9rem;
  color: rgba(255,255,255,.7);
  font-weight: 600;
  margin-top: 4px;
}
.level-btns {
  display: flex;
  gap: 12px;
}
.level-btn {
  padding: 12px 28px;
  font-size: 1.15rem;
  font-weight: 900;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  letter-spacing: 1px;
}
.level-btn:active { transform: scale(.93); }
.level-btn.easy {
  color: #1a237e;
  background: linear-gradient(135deg, #80d8ff, #40c4ff);
  box-shadow: 0 5px 18px rgba(64,196,255,.4);
}
.level-btn.hard {
  color: #4a148c;
  background: linear-gradient(135deg, #ffd54f, #ffb300);
  box-shadow: 0 5px 18px rgba(255,200,50,.4);
}

/* ==============================
   GAME SCREEN
============================== */
#gameScreen {
  justify-content: flex-start;
  padding: 0;
  height: 100%;
}

.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  padding-left: 110px;
  flex-shrink: 0;
}
.q-counter {
  font-size: .95rem;
  font-weight: 700;
  color: rgba(255,255,255,.78);
  letter-spacing: 1px;
}
.score-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,.15);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 1rem;
  font-weight: 700;
  color: white;
}

/* Question card */
.question-card {
  background: rgba(255,255,255,.13);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,.22);
  border-radius: 22px;
  padding: 12px 16px 16px;
  text-align: center;
  width: calc(100% - 28px);
  margin: 0 14px 10px;
  flex-shrink: 0;
}
.question-text {
  font-size: 1.05rem;
  color: rgba(255,255,255,.85);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
/* Object display grid */
.object-display {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 6px;
  min-height: 80px;
}
.obj-item {
  line-height: 1;
  animation: floatItem 2s ease-in-out infinite;
  animation-delay: var(--delay);
  display: inline-block;
}
@keyframes floatItem {
  0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
  50% { transform: translateY(-7px) rotate(4deg) scale(1.08); }
}

/* Answer grid */
.answer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: calc(100% - 28px);
  margin: 0 14px;
  flex: 1;
  min-height: 0;
}
.answer-btn {
  background: rgba(255,255,255,.13);
  backdrop-filter: blur(8px);
  border: 3px solid rgba(255,255,255,.22);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: transform .12s, background .15s, border-color .15s;
  padding: 8px;
  min-height: 0;
}
.answer-btn:active { transform: scale(.91); }
.answer-btn .num-big {
  font-size: clamp(2rem, 9vw, 3.6rem);
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,.35);
  line-height: 1;
  pointer-events: none;
}
.answer-btn .num-word {
  font-size: clamp(.8rem, 3.2vw, 1rem);
  font-weight: 700;
  color: rgba(255,255,255,.78);
  pointer-events: none;
}
.answer-btn .num-dots {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 3px;
  max-width: 80px;
  pointer-events: none;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,.6);
}

/* Answer states */
.answer-btn.correct {
  background: rgba(100,255,150,.3);
  border-color: #69f0ae;
  box-shadow: 0 0 26px rgba(100,255,150,.5);
  animation: correctPop .45s ease;
}
.answer-btn.wrong {
  background: rgba(255,80,80,.3);
  border-color: #ef5350;
  animation: shake .42s ease;
}
@keyframes correctPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.13); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-9px); }
  40% { transform: translateX(9px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Bottom margin */
.bottom-space { height: 12px; flex-shrink: 0; }

/* ---- Feedback overlay ---- */
.feedback-msg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2.6rem;
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 18px rgba(0,0,0,.45);
  z-index: 300;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  text-align: center;
  line-height: 1.4;
}
.feedback-msg.show { transform: translate(-50%, -50%) scale(1); }

/* ---- Particles ---- */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 280;
  animation: particleFly 1s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.3) rotate(360deg); }
}

/* ==============================
   RESULT SCREEN
============================== */
#resultScreen {
  gap: 16px;
  text-align: center;
  padding: 40px 24px;
}
.result-emoji-big { font-size: 4.5rem; animation: bounce 1.5s ease-in-out infinite; }
.result-title { font-size: 1.7rem; font-weight: 900; color: white; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
.result-score { font-size: 3.2rem; font-weight: 900; color: #ffd54f; text-shadow: 0 2px 14px rgba(0,0,0,.3); }
.result-stars { font-size: 2.6rem; letter-spacing: 6px; }
.result-comment { font-size: 1.1rem; color: rgba(255,255,255,.88); font-weight: 700; }
.result-btns { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
.btn-again {
  padding: 15px 38px;
  font-size: 1.2rem;
  font-weight: 900;
  color: #01579b;
  background: linear-gradient(135deg, #80d8ff, #40c4ff);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(64,196,255,.4);
  transition: transform .15s;
  letter-spacing: 2px;
}
.btn-again:active { transform: scale(.93); }
.btn-harder {
  padding: 15px 38px;
  font-size: 1.2rem;
  font-weight: 900;
  color: #4a148c;
  background: linear-gradient(135deg, #ffd54f, #ffb300);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,200,50,.4);
  transition: transform .15s;
  letter-spacing: 2px;
}
.btn-harder:active { transform: scale(.93); }
</style>
</head>
<body>

<div id="starsLayer" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<a href="index.html" class="home-btn">🏰 もどる</a>

<!-- ===== TITLE SCREEN ===== -->
<div class="screen active" id="titleScreen">
  <div class="title-emoji">🧮</div>
  <div class="title-text">かずの<br>せかい</div>
  <div class="title-sub">✨ かずをかぞえて こたえよう！</div>
  <div class="level-label">レベルをえらんでね</div>
  <div class="level-btns">
    <button class="level-btn easy" id="btnEasy">⭐ かんたん<br><span style="font-size:.85rem;font-weight:600">1〜5</span></button>
    <button class="level-btn hard" id="btnHard">⭐⭐ むずかしい<br><span style="font-size:.85rem;font-weight:600">1〜10</span></button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <div class="q-counter" id="qCounter">もんだい 1 / 10</div>
    <div class="score-pill">⭐ <span id="scoreDisplay">0</span></div>
  </div>

  <div class="question-card">
    <div class="question-text" id="questionText">なんこあるかな？</div>
    <div class="object-display" id="objectDisplay"></div>
  </div>

  <div class="answer-grid" id="answerGrid"></div>
  <div class="bottom-space"></div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div class="screen" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">10もんおわったよ！</div>
  <div class="result-score" id="resultScore">10 / 10</div>
  <div class="result-stars" id="resultStars">⭐⭐⭐</div>
  <div class="result-comment" id="resultComment">すごい！ぜんぶせいかい！</div>
  <div class="result-btns">
    <button class="btn-again" id="btnAgain">もう一かい！</button>
    <button class="btn-harder" id="btnHarder" style="display:none">むずかしいに<br>ちょうせん！</button>
  </div>
</div>

<div class="feedback-msg" id="feedbackMsg"></div>

<script>
// ============ OBJECTS ============
const OBJECTS = [
  { emoji: '🦄', name: 'ユニコーン' },
  { emoji: '⭐', name: 'ほし' },
  { emoji: '🌸', name: 'はな' },
  { emoji: '🍓', name: 'いちご' },
  { emoji: '💖', name: 'ハート' },
  { emoji: '🎀', name: 'リボン' },
  { emoji: '🍭', name: 'あめ' },
  { emoji: '🌈', name: 'にじ' },
  { emoji: '🐰', name: 'うさぎ' },
  { emoji: '🦋', name: 'ちょうちょ' },
];

const NUM_WORDS = ['', 'いち', 'に', 'さん', 'し', 'ご', 'ろく', 'なな', 'はち', 'きゅう', 'じゅう'];
const BTN_COLORS = [
  { border: '#ff80ab', bg: 'rgba(255,128,171,.2)' },
  { border: '#80d8ff', bg: 'rgba(128,216,255,.2)' },
  { border: '#b39ddb', bg: 'rgba(179,157,219,.2)' },
  { border: '#a5d6a7', bg: 'rgba(165,214,167,.2)' },
];

// ============ AUDIO ============
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSfxCorrect() {
  try {
    const ctx = getACtx();
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
      osc.start(t); osc.stop(t + 0.42);
    });
  } catch(e) {}
}
function playSfxWrong() {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(290, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.28);
    gain.gain.setValueAtTime(0.11, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start(); osc.stop(ctx.currentTime + 0.28);
  } catch(e) {}
}

// ============ GAME STATE ============
const TOTAL_Q = 10;
let maxNum = 5;
let qIdx = 0;
let score = 0;
let currentCount = 0;
let locked = false;
let currentLevel = 'easy';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(level) {
  getACtx();
  currentLevel = level;
  maxNum = level === 'easy' ? 5 : 10;
  qIdx = 0;
  score = 0;
  showScreen('gameScreen');
  nextQuestion();
}

function nextQuestion() {
  locked = false;
  currentCount = 1 + Math.floor(Math.random() * maxNum);

  const obj = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];
  document.getElementById('qCounter').textContent = `もんだい ${qIdx + 1} / ${TOTAL_Q}`;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('questionText').textContent = `${obj.name}は なんこかな？`;

  // Render objects
  const display = document.getElementById('objectDisplay');
  display.innerHTML = '';
  const fontSize = currentCount <= 5 ? '3rem' : currentCount <= 7 ? '2.5rem' : '2rem';
  for (let i = 0; i < currentCount; i++) {
    const el = document.createElement('span');
    el.className = 'obj-item';
    el.textContent = obj.emoji;
    el.style.fontSize = fontSize;
    el.style.setProperty('--delay', (i * 0.15) + 's');
    display.appendChild(el);
  }

  // Generate 4 choices
  const wrongNums = new Set();
  while (wrongNums.size < 3) {
    const n = 1 + Math.floor(Math.random() * maxNum);
    if (n !== currentCount) wrongNums.add(n);
  }
  const choices = shuffle([currentCount, ...[...wrongNums]]);

  // Render answer buttons
  const grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  const shuffledColors = shuffle(BTN_COLORS);
  choices.forEach((num, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    const col = shuffledColors[i];
    btn.style.borderColor = col.border;
    btn.style.background = col.bg;

    // Dots (max 10)
    const dotsHtml = Array.from({length: num}, () => `<div class="dot"></div>`).join('');

    btn.innerHTML = `
      <div class="num-big">${num}</div>
      <div class="num-word">${NUM_WORDS[num]}</div>
      <div class="num-dots">${dotsHtml}</div>
    `;
    btn.addEventListener('click', () => onAnswer(btn, num));
    grid.appendChild(btn);
  });
}

function onAnswer(btn, chosen) {
  if (locked) return;
  if (chosen === currentCount) {
    locked = true;
    btn.classList.add('correct');
    score++;
    document.getElementById('scoreDisplay').textContent = score;
    playSfxCorrect();
    showFeedback(`せいかい！\n${currentCount}こだよ！🎉`);
    spawnParticles();
    setTimeout(() => {
      hideFeedback();
      qIdx++;
      if (qIdx >= TOTAL_Q) showResult();
      else nextQuestion();
    }, 1600);
  } else {
    btn.classList.add('wrong');
    playSfxWrong();
    showFeedback('もう一かい！\nかぞえてみよう💪');
    setTimeout(() => {
      btn.classList.remove('wrong');
      hideFeedback();
      locked = false;
    }, 1050);
  }
}

// ============ UI ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showFeedback(msg) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideFeedback() {
  document.getElementById('feedbackMsg').classList.remove('show');
}

// ============ PARTICLES ============
const P_EMOJIS = ['⭐','🌟','✨','🎉','💫','🌈','🎊','💖','🦄','🧮','1️⃣','2️⃣','3️⃣'];
function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = P_EMOJIS[Math.floor(Math.random() * P_EMOJIS.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 90 + Math.random() * 200;
    p.style.cssText = `left:${cx}px;top:${cy}px;font-size:${1.1+Math.random()*1.1}rem;animation-delay:${Math.random()*.2}s;`;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1300);
  }
}

// ============ RESULT ============
function showResult() {
  const pct = score / TOTAL_Q;
  let stars, comment, emoji;
  if (pct === 1) {
    stars = '⭐⭐⭐'; comment = 'ぜんぶせいかい！\nかずのてんさい！！'; emoji = '🏆';
  } else if (pct >= 0.7) {
    stars = '⭐⭐'; comment = 'よくできました！'; emoji = '🎉';
  } else {
    stars = '⭐'; comment = 'またちょうせんしよう！'; emoji = '🧮';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = `${TOTAL_Q}もんおわったよ！`;
  document.getElementById('resultScore').textContent = `${score} / ${TOTAL_Q}`;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultComment').textContent = comment;

  // Show "harder" button only if on easy and did well
  const harderBtn = document.getElementById('btnHarder');
  harderBtn.style.display = (currentLevel === 'easy' && pct >= 0.7) ? '' : 'none';

  showScreen('resultScreen');
  spawnParticles();
  setTimeout(spawnParticles, 600);
}

// ============ EVENTS ============
document.getElementById('btnEasy').addEventListener('click', () => startGame('easy'));
document.getElementById('btnHard').addEventListener('click', () => startGame('hard'));
document.getElementById('btnAgain').addEventListener('click', () => startGame(currentLevel));
document.getElementById('btnHarder').addEventListener('click', () => startGame('hard'));

// ============ STARS ============
const sl = document.getElementById('starsLayer');
for (let i = 0; i < 50; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = 1.5 + Math.random() * 2.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*60}vh;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
  sl.appendChild(s);
}
</script>
</body>
