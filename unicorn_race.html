<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦄 ユニコーンレース</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #1a1a2e;
}
canvas { display: block; flex: 1; width: 100%; min-height: 0; }

.bottom-bar {
  background: #0d0d1a;
  height: 130px;
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 18px;
  align-items: stretch;
}
.steer-btn {
  border-radius: 22px;
  border: none;
  font-size: 3rem;
  font-weight: 900;
  cursor: pointer;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform .08s, filter .08s;
  box-shadow: 0 6px 20px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.2);
}
.steer-btn:active { transform: scale(.9); filter: brightness(1.3); }
#btnLeft  { background: linear-gradient(135deg, #7c4dff, #b388ff); }
#btnRight { background: linear-gradient(135deg, #f06292, #ff80ab); }

.home-btn {
  position: fixed;
  top: 10px; left: 10px;
  z-index: 50;
  padding: 7px 13px;
  font-size: .82rem;
  font-weight: 700;
  color: #7b1fa2;
  background: rgba(255,255,255,.88);
  border: 2px solid #ce93d8;
  border-radius: 22px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.home-btn:active { transform: scale(.95); }
</style>
</head>
<body>
<a href="index.html" class="home-btn">🏰 もどる</a>
<canvas id="game"></canvas>
<div class="bottom-bar">
  <button class="steer-btn" id="btnLeft">⬅️</button>
  <button class="steer-btn" id="btnRight">➡️</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const bar = document.querySelector('.bottom-bar');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - bar.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Input ----
const keys = { left: false, right: false };

document.getElementById('btnLeft').addEventListener('pointerdown',  e => { e.preventDefault(); keys.left = true; });
document.getElementById('btnRight').addEventListener('pointerdown', e => { e.preventDefault(); keys.right = true; });
['btnLeft','btnRight'].forEach(id => {
  const b = document.getElementById(id);
  ['pointerup','pointercancel','pointerleave'].forEach(ev =>
    b.addEventListener(ev, () => { keys.left = false; keys.right = false; })
  );
});
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft'  || e.key==='a') keys.left  = true;
  if (e.key==='ArrowRight' || e.key==='d') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'  || e.key==='a') keys.left  = false;
  if (e.key==='ArrowRight' || e.key==='d') keys.right = false;
});

// ---- Constants ----
const ROAD_W_BASE = 0.68; // fraction of canvas width
const CAR_W = 48, CAR_H = 70;
const SCROLL_SPEED_BASE = 4.5;
const TOTAL_LAPS = 3;
const STAR_SCORE = 10;

// ---- Road curve ----
// Road center X oscillates slowly to create gentle curves
let roadCurveAngle = 0;
let roadCenterX = 0.5; // 0..1 fraction
let roadCenterTarget = 0.5;
const CURVE_SPEED = 0.008;
const CURVE_RANGE = 0.18;

// ---- Scroll offset (for decorations) ----
let scrollY = 0;
let distanceTravelled = 0;
const RACE_DISTANCE = 6000; // pixels of scroll per lap

// ---- Player ----
const player = {
  x: 0.5, // fraction of canvas width
  vx: 0,
  speed: SCROLL_SPEED_BASE,
  lap: 0,
  finished: false,
  bounceAnim: 0,
  sparkTrail: [],
};

// ---- Opponents ----
const OPPONENTS = [
  { emoji: '🐰', color: '#ff80ab', name: 'うさちゃん' },
  { emoji: '🐻', color: '#ffb74d', name: 'くまちゃん' },
  { emoji: '🐸', color: '#81c784', name: 'かえるちゃん' },
];
let opponents = [];

function initOpponents() {
  opponents = OPPONENTS.map((o, i) => ({
    ...o,
    x: 0.25 + i * 0.22,
    // Start behind player
    screenY: canvas.height * 0.3 + i * 60,
    speed: SCROLL_SPEED_BASE * (0.82 + Math.random() * 0.12),
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.03 + Math.random() * 0.02,
    finished: false,
    rank: 0,
    sparkTrail: [],
  }));
}

// ---- Stars to collect ----
let stars = [];
let starsCollected = 0;
let score = 0;

function spawnStar() {
  stars.push({
    x: 0.15 + Math.random() * 0.7,
    y: -60 - Math.random() * 200,
    collected: false,
    anim: 0,
    rotate: Math.random() * Math.PI * 2,
  });
}

// ---- Roadside decorations ----
let decorations = [];
const DECO_EMOJIS = ['🌸','🌳','🌼','🌺','🌲','🌻','🌷','🍭','🎈'];
function spawnDecoration() {
  const side = Math.random() < 0.5 ? 'left' : 'right';
  decorations.push({
    side,
    y: -80,
    emoji: DECO_EMOJIS[Math.floor(Math.random() * DECO_EMOJIS.length)],
    size: 0.7 + Math.random() * 0.5,
    offset: Math.random() * 30,
  });
}

// ---- Particles ----
let particles = [];
function spawnCollectParticles(sx, sy) {
  for (let i = 0; i < 10; i++) {
    const a = (i/10)*Math.PI*2;
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(a)*(2+Math.random()*3),
      vy: Math.sin(a)*(2+Math.random()*3) - 1,
      life: 1.0,
      emoji: ['⭐','✨','💫'][i%3],
      size: 14 + Math.random()*10,
    });
  }
}

// ---- Lap flash ----
let lapFlash = 0;
let lapMsg = '';

// ---- Rank ----
let finishOrder = [];
let playerRank = 0;
let gameState = 'playing'; // 'playing' | 'finished'
let finishAnimT = 0;
let finishStars = [];

function spawnFinishStars() {
  for (let i = 0; i < 50; i++) {
    finishStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random()-.5)*7,
      vy: (Math.random()-.5)*7 - 2,
      life: 1.0,
      size: 18 + Math.random()*24,
      emoji: ['🌟','✨','🎉','🎊','⭐','🦄','🏆'][Math.floor(Math.random()*7)],
    });
  }
}

// ---- Init ----
function init() {
  roadCurveAngle = 0;
  roadCenterX = 0.5;
  roadCenterTarget = 0.5;
  scrollY = 0;
  distanceTravelled = 0;
  player.x = 0.5;
  player.vx = 0;
  player.lap = 0;
  player.finished = false;
  player.bounceAnim = 0;
  player.sparkTrail = [];
  score = 0;
  starsCollected = 0;
  stars = [];
  decorations = [];
  particles = [];
  lapFlash = 0;
  finishOrder = [];
  playerRank = 0;
  gameState = 'playing';
  finishAnimT = 0;
  finishStars = [];
  initOpponents();

  // Spawn initial decorations
  for (let i = 0; i < 10; i++) {
    decorations.push({
      side: i % 2 === 0 ? 'left' : 'right',
      y: -i * 120,
      emoji: DECO_EMOJIS[Math.floor(Math.random() * DECO_EMOJIS.length)],
      size: 0.7 + Math.random() * 0.5,
      offset: Math.random() * 30,
    });
  }
  for (let i = 0; i < 5; i++) spawnStar();
}

// ---- Road geometry ----
function getRoadCenterPx() {
  return roadCenterX * canvas.width;
}
function getRoadWidthPx() {
  return ROAD_W_BASE * Math.min(canvas.width, 480);
}

// ---- Update ----
function update() {
  if (gameState !== 'playing') {
    finishAnimT += 0.03;
    // Update finish stars
    for (let i = finishStars.length-1; i >= 0; i--) {
      const s = finishStars[i];
      s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life -= 0.008;
      if (s.life <= 0) finishStars.splice(i, 1);
    }
    if (finishStars.length < 25) spawnFinishStars();
    return;
  }

  const W = canvas.width, H = canvas.height;
  const scrollSpeed = player.speed;
  scrollY += scrollSpeed;
  distanceTravelled += scrollSpeed;

  // Road curve update
  roadCurveAngle += CURVE_SPEED;
  roadCenterTarget = 0.5 + Math.sin(roadCurveAngle) * CURVE_RANGE;
  roadCenterX += (roadCenterTarget - roadCenterX) * 0.04;

  // Player steering
  const steerSpeed = 0.008;
  if (keys.left)  player.vx -= steerSpeed;
  if (keys.right) player.vx += steerSpeed;
  player.vx *= 0.82; // damping
  player.x += player.vx;

  // Keep player on road (gentle bounce back)
  const roadCX = getRoadCenterPx() / W;
  const roadHalf = getRoadWidthPx() / 2 / W;
  const leftEdge  = roadCX - roadHalf + 0.05;
  const rightEdge = roadCX + roadHalf - 0.05;
  if (player.x < leftEdge) {
    player.x = leftEdge;
    player.vx = Math.abs(player.vx) * 0.4;
    player.bounceAnim = 1.0;
  }
  if (player.x > rightEdge) {
    player.x = rightEdge;
    player.vx = -Math.abs(player.vx) * 0.4;
    player.bounceAnim = 1.0;
  }
  if (player.bounceAnim > 0) player.bounceAnim -= 0.08;

  // Speed boost if on road center
  const distFromCenter = Math.abs(player.x - roadCX) / roadHalf;
  player.speed = SCROLL_SPEED_BASE * (1.0 + (1 - distFromCenter) * 0.3);

  // Player spark trail
  player.sparkTrail.unshift({ x: player.x * W, y: H * 0.72, life: 1.0 });
  if (player.sparkTrail.length > 8) player.sparkTrail.pop();
  player.sparkTrail.forEach(s => s.life -= 0.12);

  // Lap check
  if (distanceTravelled >= RACE_DISTANCE * (player.lap + 1)) {
    if (player.lap < TOTAL_LAPS - 1) {
      player.lap++;
      lapFlash = 2.5;
      lapMsg = player.lap === TOTAL_LAPS - 1 ? 'さいごの ラップ！' : `ラップ ${player.lap + 1}！`;
    } else if (!player.finished) {
      player.finished = true;
      finishOrder.push('player');
      playerRank = finishOrder.length;
      if (finishOrder.length >= 4) {
        gameState = 'finished';
        finishAnimT = 0;
        spawnFinishStars();
      }
    }
  }
  if (lapFlash > 0) lapFlash -= 0.04;

  // Opponents update
  opponents.forEach((opp, oi) => {
    if (opp.finished) return;
    opp.wobble += opp.wobbleSpeed;
    const oppDist = opp.speed * (distanceTravelled / SCROLL_SPEED_BASE);
    // Opponents are at different Y positions based on how far behind player
    // They gradually catch up or fall behind
    const targetY = H * 0.4 + oi * 45;
    opp.screenY += (targetY - opp.screenY) * 0.01;

    // Gentle wobble in X
    const roadCXopp = getRoadCenterPx() / W;
    const roadHalfOpp = getRoadWidthPx() / 2 / W;
    const baseX = roadCXopp + (oi - 1) * 0.12;
    opp.x = Math.max(roadCXopp - roadHalfOpp + 0.06,
              Math.min(roadCXopp + roadHalfOpp - 0.06,
                baseX + Math.sin(opp.wobble) * 0.04));

    // Opponent lap check
    opp.distTravelled = (opp.distTravelled || 0) + opp.speed;
    if (opp.distTravelled >= RACE_DISTANCE * TOTAL_LAPS && !opp.finished) {
      opp.finished = true;
      finishOrder.push('opp_' + oi);
      if (finishOrder.length >= 4) {
        if (!player.finished) {
          player.finished = true;
          finishOrder.push('player');
          playerRank = finishOrder.length;
        }
        gameState = 'finished';
        finishAnimT = 0;
        spawnFinishStars();
      }
    }

    // Spark trail for opponents
    opp.sparkTrail = opp.sparkTrail || [];
    opp.sparkTrail.unshift({ x: opp.x * W, y: opp.screenY + CAR_H*0.4, life: 1.0 });
    if (opp.sparkTrail.length > 5) opp.sparkTrail.pop();
    opp.sparkTrail.forEach(s => s.life -= 0.15);
  });

  // Stars update
  stars.forEach(s => {
    s.y += scrollSpeed;
    s.rotate += 0.06;
    s.anim = Math.max(0, s.anim - 0.06);
    // Collect check
    if (!s.collected) {
      const dx = (s.x - player.x) * W;
      const dy = s.y - H * 0.72;
      if (Math.sqrt(dx*dx + dy*dy) < 35) {
        s.collected = true;
        s.anim = 1.0;
        starsCollected++;
        score += STAR_SCORE;
        spawnCollectParticles(s.x * W, s.y);
      }
    }
  });
  // Remove off-screen stars, spawn new ones
  stars = stars.filter(s => s.y < H + 80);
  while (stars.length < 5) spawnStar();

  // Decorations update
  decorations.forEach(d => { d.y += scrollSpeed; });
  decorations = decorations.filter(d => d.y < H + 100);
  if (decorations.length < 12 && Math.random() < 0.08) spawnDecoration();

  // Particles update
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---- Draw ----
function drawRoad() {
  const W = canvas.width, H = canvas.height;
  const roadCX = getRoadCenterPx();
  const roadHalf = getRoadWidthPx() / 2;

  // Sky gradient background
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(0.5, '#b3e5fc');
  sky.addColorStop(1, '#e1f5fe');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Grass sides
  ctx.fillStyle = '#66bb6a';
  ctx.fillRect(0, 0, roadCX - roadHalf, H);
  ctx.fillRect(roadCX + roadHalf, 0, W - (roadCX + roadHalf), H);

  // Grass texture dots
  ctx.fillStyle = '#81c784';
  for (let y = (scrollY % 40); y < H; y += 40) {
    for (let x = 5; x < roadCX - roadHalf - 5; x += 30) {
      ctx.beginPath();
      ctx.arc(x + (y*7)%20, y, 4, 0, Math.PI*2);
      ctx.fill();
    }
    for (let x = roadCX + roadHalf + 5; x < W - 5; x += 30) {
      ctx.beginPath();
      ctx.arc(x + (y*5)%20, y, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Road surface
  const roadGrd = ctx.createLinearGradient(roadCX - roadHalf, 0, roadCX + roadHalf, 0);
  roadGrd.addColorStop(0, '#546e7a');
  roadGrd.addColorStop(0.15, '#607d8b');
  roadGrd.addColorStop(0.5, '#78909c');
  roadGrd.addColorStop(0.85, '#607d8b');
  roadGrd.addColorStop(1, '#546e7a');
  ctx.fillStyle = roadGrd;
  ctx.fillRect(roadCX - roadHalf, 0, roadHalf * 2, H);

  // Road edge stripes (white)
  ctx.fillStyle = '#ffffffcc';
  ctx.fillRect(roadCX - roadHalf, 0, 6, H);
  ctx.fillRect(roadCX + roadHalf - 6, 0, 6, H);

  // Road edge yellow outer
  ctx.fillStyle = '#ffee58';
  ctx.fillRect(roadCX - roadHalf - 6, 0, 6, H);
  ctx.fillRect(roadCX + roadHalf, 0, 6, H);

  // Center dashed line
  ctx.strokeStyle = 'rgba(255,255,200,0.5)';
  ctx.lineWidth = 4;
  ctx.setLineDash([30, 25]);
  ctx.lineDashOffset = -(scrollY % 55);
  ctx.beginPath();
  ctx.moveTo(roadCX, 0);
  ctx.lineTo(roadCX, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Lane lines
  const lanePct = [-0.33, 0.33];
  ctx.strokeStyle = 'rgba(255,255,200,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 30]);
  ctx.lineDashOffset = -(scrollY % 50);
  lanePct.forEach(p => {
    ctx.beginPath();
    ctx.moveTo(roadCX + p * roadHalf, 0);
    ctx.lineTo(roadCX + p * roadHalf, H);
    ctx.stroke();
  });
  ctx.setLineDash([]);
}

function drawDecorations() {
  const W = canvas.width;
  const roadCX = getRoadCenterPx();
  const roadHalf = getRoadWidthPx() / 2;

  decorations.forEach(d => {
    let dx;
    if (d.side === 'left') {
      dx = Math.max(20, roadCX - roadHalf - 30 - d.offset);
    } else {
      dx = Math.min(W - 20, roadCX + roadHalf + 30 + d.offset);
    }
    ctx.font = `${28 * d.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.emoji, dx, d.y);
  });
}

function drawSparkTrail(trail, color) {
  trail.forEach((s, i) => {
    if (s.life <= 0) return;
    ctx.globalAlpha = s.life * 0.6;
    ctx.fillStyle = color;
    const r = 5 * s.life;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1.0;
}

function drawMiniCar(cx, cy, emoji, carColor, isPlayer, bounceAnim) {
  ctx.save();
  ctx.translate(cx, cy);

  const bounce = isPlayer ? Math.sin(bounceAnim * Math.PI) * 6 : 0;
  ctx.translate(0, bounce * (bounceAnim > 0 ? 1 : 0));

  const w = CAR_W, h = CAR_H;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(3, h*0.42, w*0.46, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Car body
  const bodyGrd = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  bodyGrd.addColorStop(0, shadeColor(carColor, -30));
  bodyGrd.addColorStop(0.4, carColor);
  bodyGrd.addColorStop(1, shadeColor(carColor, -20));
  ctx.fillStyle = bodyGrd;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 10);
  ctx.fill();

  // Car roof (darker top half)
  ctx.fillStyle = shadeColor(carColor, -40);
  ctx.beginPath();
  ctx.roundRect(-w/2+4, -h/2+4, w-8, h/2-4, [8,8,0,0]);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(200,235,255,0.75)';
  ctx.beginPath();
  ctx.roundRect(-w/2+7, -h/2+6, w-14, h*0.28, [6,6,2,2]);
  ctx.fill();

  // Wheels
  const wheelPositions = [
    [-w/2-4, -h/2+6],
    [w/2-4,  -h/2+6],
    [-w/2-4,  h/2-14],
    [w/2-4,   h/2-14],
  ];
  wheelPositions.forEach(([wx, wy]) => {
    ctx.fillStyle = '#212121';
    ctx.beginPath();
    ctx.roundRect(wx, wy, 8, 12, 3);
    ctx.fill();
    ctx.fillStyle = '#9e9e9e';
    ctx.beginPath();
    ctx.arc(wx+4, wy+6, 3, 0, Math.PI*2);
    ctx.fill();
  });

  // Headlights (bottom = front for top-down)
  ctx.fillStyle = '#fff9c4';
  [[-w/2+6, h/2-8], [w/2-14, h/2-8]].forEach(([lx,ly]) => {
    ctx.beginPath();
    ctx.ellipse(lx+4, ly+3, 5, 3, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Character on car
  ctx.font = `${isPlayer ? 28 : 22}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 0, -4);

  // Player crown / sparkle
  if (isPlayer) {
    ctx.font = '14px serif';
    ctx.fillText('👑', w/2-2, -h/2);
  }

  ctx.restore();
}

function shadeColor(hex, amount) {
  // Simple hex shade
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return `rgb(${r},${g},${b})`;
}

function drawStars() {
  stars.forEach(s => {
    if (s.collected) {
      if (s.anim > 0) {
        ctx.save();
        ctx.globalAlpha = s.anim;
        ctx.font = `${20 + (1-s.anim)*20}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⭐', s.x * canvas.width, s.y - s.anim*30);
        ctx.restore();
      }
      return;
    }
    ctx.save();
    ctx.translate(s.x * canvas.width, s.y);
    ctx.rotate(s.rotate);
    const sc = 1 + Math.sin(Date.now()*0.005 + s.x*10) * 0.15;
    ctx.scale(sc, sc);
    ctx.font = '26px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', 0, 0);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, p.x, p.y);
  });
  ctx.globalAlpha = 1.0;
}

function drawHUD() {
  const W = canvas.width, H = canvas.height;
  const lapFrac = (distanceTravelled % RACE_DISTANCE) / RACE_DISTANCE;
  const lapDisplay = Math.min(player.lap + 1, TOTAL_LAPS);

  // Top bar background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 130, 8, 260, 46, 14);
  ctx.fill();

  // Lap indicator
  ctx.font = 'bold 14px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(`ラップ ${lapDisplay} / ${TOTAL_LAPS}`, W/2 - 120, 31);

  // Lap progress bar
  const barX = W/2 - 30, barY = 22, barW = 100, barH = 14;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 6); ctx.fill();
  const grd = ctx.createLinearGradient(barX, 0, barX+barW, 0);
  grd.addColorStop(0, '#ff6ec7');
  grd.addColorStop(1, '#ffd54f');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * lapFrac, barH, 6); ctx.fill();

  // Score
  ctx.font = 'bold 14px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd54f';
  ctx.fillText(`⭐ ${score}`, W/2 + 118, 31);

  // Lap flash message
  if (lapFlash > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, lapFlash) * Math.min(1, (2.5 - lapFlash) * 2);
    const sc = 1 + Math.sin(lapFlash * 4) * 0.05;
    ctx.translate(W/2, H/2 - 40);
    ctx.scale(sc, sc);
    ctx.font = 'bold 30px "Hiragino Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54f';
    ctx.strokeStyle = '#7b1fa2';
    ctx.lineWidth = 5;
    ctx.strokeText(lapMsg, 0, 0);
    ctx.fillText(lapMsg, 0, 0);
    ctx.restore();
  }

  // Speed indicator (fun for kids - stars)
  const speedPct = (player.speed - SCROLL_SPEED_BASE) / (SCROLL_SPEED_BASE * 0.3);
  if (speedPct > 0.3) {
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = speedPct;
    ctx.fillText('💨', player.x * W + 20, H * 0.72 - CAR_H/2 - 10);
    ctx.globalAlpha = 1;
  }
}

function drawFinishScreen() {
  const W = canvas.width, H = canvas.height;

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Finish stars
  finishStars.forEach(s => {
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.font = `${s.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.emoji, s.x, s.y);
  });
  ctx.globalAlpha = 1.0;

  const bw = Math.min(W - 40, 340), bh = 300;
  const bx = (W - bw)/2, by = (H - bh)/2;

  // Panel shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(bx+6, by+6, bw, bh, 28); ctx.fill();

  // Panel gradient
  const sc = 1 + Math.sin(finishAnimT*2.5)*0.02;
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(sc, sc);
  ctx.translate(-W/2, -H/2);

  const panelGrd = ctx.createLinearGradient(bx, by, bx+bw, by+bh);
  panelGrd.addColorStop(0, '#6a1b9a');
  panelGrd.addColorStop(.5, '#d81b60');
  panelGrd.addColorStop(1, '#f06292');
  ctx.fillStyle = panelGrd;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 28); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 28); ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Rank medal
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const rankEmoji = medals[Math.min(playerRank-1, 3)];
  const rankTexts = ['すごい！1いだ！！', 'やったー！2いだ！', 'がんばった！3い！', 'つぎは もっと はやく！'];
  const rankColors = ['#ffd700', '#e0e0e0', '#cd7f32', '#90caf9'];

  ctx.font = '64px serif';
  ctx.fillText(rankEmoji, W/2, by + 65);

  ctx.font = `bold 24px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = rankColors[Math.min(playerRank-1, 3)];
  ctx.fillText(rankTexts[Math.min(playerRank-1, 3)], W/2, by + 130);

  ctx.font = `18px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(`⭐ スコア: ${score}`, W/2, by + 170);

  // Results
  ctx.font = `14px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const allPlayers = [
    { name: 'ユニコーン', emoji: '🦄', rank: playerRank },
    ...opponents.map((o, i) => ({
      name: o.name, emoji: o.emoji,
      rank: finishOrder.indexOf('opp_' + i) + 1 || 4,
    })),
  ].sort((a, b) => a.rank - b.rank);

  allPlayers.forEach((p, i) => {
    const ry = by + 200 + i * 22;
    ctx.textAlign = 'left';
    ctx.fillText(`${medals[p.rank-1]} ${p.emoji} ${p.name}`, bx + 30, ry);
  });

  // Play again button
  const btnW = 200, btnH = 48;
  const btnX = W/2 - btnW/2, btnY = by + bh - 60;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 24); ctx.fill();
  ctx.font = `bold 17px "Hiragino Sans", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#6a1b9a';
  ctx.fillText('🏁 もういちど レース！', W/2, btnY+24);

  ctx.restore();

  // Store retry button bounds
  retryBtn.x = bx + (bw-200)/2;
  retryBtn.y = by + bh - 60;
  retryBtn.w = 200;
  retryBtn.h = 48;
}

const retryBtn = { x:0, y:0, w:200, h:48 };

canvas.addEventListener('pointerdown', e => {
  if (gameState !== 'finished') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  if (mx >= retryBtn.x && mx <= retryBtn.x + retryBtn.w &&
      my >= retryBtn.y && my <= retryBtn.y + retryBtn.h) {
    init();
  }
});

// ---- Main Loop ----
function loop() {
  update();

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  drawRoad();
  drawDecorations();
  drawStars();

  // Draw opponent spark trails
  opponents.forEach(opp => {
    drawSparkTrail(opp.sparkTrail || [], opp.color);
  });

  // Draw player spark trail
  drawSparkTrail(player.sparkTrail, '#ff80ff');

  // Draw opponents (sorted by Y so closer ones appear on top)
  opponents
    .slice()
    .sort((a, b) => a.screenY - b.screenY)
    .forEach(opp => {
      drawMiniCar(opp.x * W, opp.screenY, opp.emoji, opp.color, false, 0);
    });

  // Draw player car (always at ~72% down the screen)
  drawMiniCar(player.x * W, H * 0.72, '🦄', '#e91e8c', true, player.bounceAnim);

  drawParticles();
  drawHUD();

  if (gameState === 'finished') drawFinishScreen();

  requestAnimationFrame(loop);
}

init();
loop();
</script>
