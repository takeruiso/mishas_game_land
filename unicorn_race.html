<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦄 ユニコーンレース</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #1a1a2e;
}
canvas { display: block; flex: 1; width: 100%; min-height: 0; }
.bottom-bar {
  background: #0d0d1a;
  height: 130px; flex-shrink: 0;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; padding: 12px 16px 18px; align-items: stretch;
}
.steer-btn {
  border-radius: 22px; border: none; font-size: 3rem; font-weight: 900;
  cursor: pointer; color: white; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  box-shadow: 0 6px 20px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.2);
  transition: transform .08s;
}
.steer-btn:active { transform: scale(.9); }
#btnLeft  { background: linear-gradient(135deg, #7c4dff, #b388ff); }
#btnRight { background: linear-gradient(135deg, #f06292, #ff80ab); }
.home-btn {
  position: fixed; top: 10px; left: 10px; z-index: 50;
  padding: 7px 13px; font-size: .82rem; font-weight: 700;
  color: #7b1fa2; background: rgba(255,255,255,.88);
  border: 2px solid #ce93d8; border-radius: 22px; cursor: pointer;
  text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
</style>
</head>
<body>
<a href="index.html" class="home-btn">🏰 もどる</a>
<canvas id="game"></canvas>
<div class="bottom-bar">
  <button class="steer-btn" id="btnLeft">⬅️</button>
  <button class="steer-btn" id="btnRight">➡️</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- Resize ----
function resize() {
  const bar = document.querySelector('.bottom-bar');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - bar.offsetHeight;
  buildRoadGradient();
}
window.addEventListener('resize', resize);

// ---- Input ----
const keys = { left: false, right: false };
document.getElementById('btnLeft').addEventListener('pointerdown',  e => { e.preventDefault(); keys.left  = true; });
document.getElementById('btnRight').addEventListener('pointerdown', e => { e.preventDefault(); keys.right = true; });
['btnLeft','btnRight'].forEach(id => {
  const b = document.getElementById(id);
  ['pointerup','pointercancel','pointerleave'].forEach(ev =>
    b.addEventListener(ev, () => { keys.left = false; keys.right = false; })
  );
});
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft'  || e.key==='a') keys.left  = true;
  if (e.key==='ArrowRight' || e.key==='d') keys.right = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'  || e.key==='a') keys.left  = false;
  if (e.key==='ArrowRight' || e.key==='d') keys.right = false;
});

// ---- Constants ----
const TOTAL_LAPS         = 3;
const LAP_DIST           = 4000;   // distance units per lap
const PLAYER_SPEED_BASE  = 3.2;    // initial player speed (slower than NPCs)
const SPEED_BOOST_PER_STAR = 0.32; // speed added per star collected
const SPEED_BOOST_MAX    = 3.2;    // max total boost (player max speed = 6.4)
const VIEW_SCALE         = 0.55;   // distance units → screen pixels offset
const ROAD_W_FRAC        = 0.72;   // road width as fraction of canvas width

// ---- Pre-baked assets ----
let roadGrd = null;
function buildRoadGradient() {
  const W = canvas.width;
  const rw = getRoadW();
  const rx = (W - rw) / 2;
  roadGrd = ctx.createLinearGradient(rx, 0, rx + rw, 0);
  roadGrd.addColorStop(0,    '#4a5568');
  roadGrd.addColorStop(0.12, '#607d8b');
  roadGrd.addColorStop(0.5,  '#78909c');
  roadGrd.addColorStop(0.88, '#607d8b');
  roadGrd.addColorStop(1,    '#4a5568');
}

// ---- Road ----
let roadOffset = 0; // for scrolling stripes

function getRoadW() {
  return Math.min(canvas.width, 500) * ROAD_W_FRAC;
}
function getRoadX() {
  return (canvas.width - getRoadW()) / 2;
}

// ---- State ----
let playerDist = 0;
let playerX    = 0.5;   // 0..1 within road
let playerVx   = 0;
let playerLap  = 0;
let playerFinished = false;

// NPCs: dist tracks real distance, screenY derived from dist diff vs player
const NPC_DEFS = [
  { label: 'うさちゃん',  color: '#ff80ab', bodyColor: '#f06292', startAhead: 200, speed: 4.8 },
  { label: 'くまちゃん',  color: '#ffb74d', bodyColor: '#ffa726', startAhead: 400, speed: 5.1 },
  { label: 'かえるちゃん', color: '#81c784', bodyColor: '#4caf50', startAhead: 600, speed: 5.4 },
];
let npcs = [];

function initNpcs() {
  npcs = NPC_DEFS.map((def, i) => ({
    ...def,
    dist: def.startAhead,
    x: 0.28 + i * 0.22,
    wobble: i * 1.1,
    lap: 0,
    finished: false,
    finishRank: 0,
  }));
}

// ---- Stars ----
const MAX_STARS = 4;
let stars = [];
function spawnStar() {
  const rw = getRoadW(), rx = getRoadX(), W = canvas.width;
  stars.push({
    worldDist: playerDist + canvas.height * 1.5 / VIEW_SCALE + Math.random() * 500,
    x: rx + 30 + Math.random() * (rw - 60),
    collected: false,
    spin: 0,
  });
}

// ---- Decorations (fixed-distance world objects, no emoji) ----
const DECO_COLORS  = ['#e91e63','#9c27b0','#2196f3','#4caf50','#ff9800','#00bcd4'];
const DECO_SHAPES  = ['circle','tri','circle','square','tri','circle'];
let decos = [];
function spawnDeco() {
  const rw = getRoadW(), rx = getRoadX(), W = canvas.width;
  const side = Math.random() < 0.5;
  decos.push({
    worldDist: playerDist + canvas.height * 1.2 / VIEW_SCALE + Math.random() * 300,
    x: side ? rx - 15 - Math.random() * 50 : rx + rw + 15 + Math.random() * 50,
    colorIdx: Math.floor(Math.random() * DECO_COLORS.length),
    size: 12 + Math.random() * 14,
    shape: DECO_SHAPES[Math.floor(Math.random() * DECO_SHAPES.length)],
  });
}

// ---- Particles (simple circles, no emoji) ----
let particles = [];
function spawnCollect(sx, sy) {
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    particles.push({ x: sx, y: sy, vx: Math.cos(a)*3, vy: Math.sin(a)*3 - 1,
                     life: 1.0, color: ['#ffd700','#ff6ec7','#fff'][i%3] });
  }
}

// ---- Lap flash ----
let lapFlash = 0, lapMsg = '';

// ---- Finish ----
let gameState = 'playing';
let finishOrder = [];
let playerRank  = 0;
let finishT = 0;

// ---- Score & speed ----
let score = 0;
let playerSpeedBoost = 0;
let playerSpeed = PLAYER_SPEED_BASE;

// ---- Init ----
function init() {
  playerDist = 0; playerX = 0.5; playerVx = 0;
  playerLap = 0; playerFinished = false;
  score = 0; lapFlash = 0;
  playerSpeedBoost = 0; playerSpeed = PLAYER_SPEED_BASE;
  gameState = 'playing'; finishOrder = []; playerRank = 0; finishT = 0;
  stars = []; decos = []; particles = [];
  roadOffset = 0;
  initNpcs();
  for (let i = 0; i < MAX_STARS; i++) spawnStar();
  for (let i = 0; i < 8; i++) spawnDeco();
  buildRoadGradient();
}

// ---- Update ----
function update() {
  if (gameState !== 'playing') { finishT += 0.03; return; }

  const W = canvas.width, H = canvas.height;
  const rw = getRoadW(), rx = getRoadX();
  const roadHalf = 0.5;

  roadOffset += playerSpeed;

  // Player
  const steer = 0.009;
  if (keys.left)  playerVx -= steer;
  if (keys.right) playerVx += steer;
  playerVx *= 0.80;
  playerX  += playerVx;

  // Road edge clamp
  const minX = 0.04, maxX = 0.96;
  if (playerX < minX) { playerX = minX; playerVx =  Math.abs(playerVx) * 0.3; }
  if (playerX > maxX) { playerX = maxX; playerVx = -Math.abs(playerVx) * 0.3; }

  playerDist += playerSpeed;

  // Lap check
  const lapTarget = LAP_DIST * (playerLap + 1);
  if (playerDist >= lapTarget) {
    if (playerLap < TOTAL_LAPS - 1) {
      playerLap++;
      lapFlash = 2.5;
      lapMsg = playerLap === TOTAL_LAPS - 1 ? 'さいごの ラップ！🔥' : `ラップ ${playerLap + 1}！`;
    } else if (!playerFinished) {
      playerFinished = true;
      finishOrder.push(-1); // -1 = player
      playerRank = finishOrder.length;
      checkGameOver();
    }
  }
  if (lapFlash > 0) lapFlash -= 0.04;

  // NPCs
  npcs.forEach((npc, i) => {
    if (npc.finished) return;
    npc.wobble += 0.04;
    npc.dist += npc.speed;

    // Lap check for NPC
    const npcLap = Math.floor(npc.dist / LAP_DIST);
    npc.lap = Math.min(npcLap, TOTAL_LAPS - 1);
    if (npc.dist >= LAP_DIST * TOTAL_LAPS && !npc.finished) {
      npc.finished = true;
      finishOrder.push(i);
      npc.finishRank = finishOrder.length;
      checkGameOver();
    }
  });

  // Stars
  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    s.spin += 0.06;
    if (s.collected) { stars.splice(i, 1); continue; }
    // Screen Y of this star
    const sy = worldToScreenY(s.worldDist, H);
    if (sy > H + 40) { stars.splice(i, 1); continue; }
    // Collect check
    const px = rx + playerX * rw;
    const py = H * 0.75;
    if (Math.abs(s.x - px) < 32 && Math.abs(sy - py) < 32) {
      s.collected = true;
      score += 10;
      spawnCollect(s.x, sy);
      // Speed boost
      playerSpeedBoost = Math.min(playerSpeedBoost + SPEED_BOOST_PER_STAR, SPEED_BOOST_MAX);
      playerSpeed = PLAYER_SPEED_BASE + playerSpeedBoost;
    }
  }
  while (stars.length < MAX_STARS) spawnStar();

  // Decorations
  for (let i = decos.length - 1; i >= 0; i--) {
    const sy = worldToScreenY(decos[i].worldDist, H);
    if (sy > H + 60) decos.splice(i, 1);
  }
  while (decos.length < 10) spawnDeco();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.05;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function checkGameOver() {
  // Game ends when all 4 finishers are recorded, or 10s after player finishes
  if (finishOrder.length >= 4) {
    if (!playerFinished) {
      playerFinished = true;
      finishOrder.push(-1);
      playerRank = finishOrder.length;
    }
    gameState = 'finished';
  } else if (playerFinished && finishOrder.length >= 1) {
    // Give remaining NPCs final positions and end
    npcs.forEach((npc, i) => {
      if (!npc.finished) { npc.finished = true; finishOrder.push(i); }
    });
    gameState = 'finished';
  }
}

// ---- World → Screen Y ----
// Objects ahead of player (higher dist) appear higher on screen
function worldToScreenY(worldDist, H) {
  const playerScreenY = H * 0.75;
  return playerScreenY - (worldDist - playerDist) * VIEW_SCALE;
}

// ---- Draw Road ----
function drawRoad() {
  const W = canvas.width, H = canvas.height;
  const rw = getRoadW(), rx = getRoadX();

  // Sky
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, W, H * 0.5);
  ctx.fillStyle = '#b2dfdb';
  ctx.fillRect(0, H * 0.5, W, H * 0.5);

  // Grass
  ctx.fillStyle = '#66bb6a';
  ctx.fillRect(0, 0, rx, H);
  ctx.fillRect(rx + rw, 0, W - rx - rw, H);

  // Road surface
  ctx.fillStyle = roadGrd || '#607d8b';
  ctx.fillRect(rx, 0, rw, H);

  // Yellow edge lines
  ctx.fillStyle = '#ffee58';
  ctx.fillRect(rx - 5,      0, 5, H);
  ctx.fillRect(rx + rw,     0, 5, H);

  // White inner edge
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(rx,          0, 5, H);
  ctx.fillRect(rx + rw - 5, 0, 5, H);

  // Center dashes (scroll with roadOffset)
  ctx.fillStyle = 'rgba(255,255,200,0.45)';
  const dashH = 28, gapH = 22, period = dashH + gapH;
  const startY = -(roadOffset % period);
  for (let y = startY; y < H; y += period) {
    ctx.fillRect(rx + rw/2 - 3, y, 6, dashH);
  }

  // Lane dividers
  ctx.fillStyle = 'rgba(255,255,200,0.18)';
  const laneOffsets = [-rw * 0.28, rw * 0.28];
  laneOffsets.forEach(lo => {
    for (let y = startY; y < H; y += period) {
      ctx.fillRect(rx + rw/2 + lo - 2, y, 4, dashH);
    }
  });
}

// ---- Draw Finish Lines ----
function drawFinishLines() {
  const H = canvas.height;
  const rw = getRoadW(), rx = getRoadX();

  for (let lap = 1; lap <= TOTAL_LAPS; lap++) {
    const worldDist = LAP_DIST * lap;
    const sy = worldToScreenY(worldDist, H);
    if (sy < -60 || sy > H + 60) continue;

    const isLastLap = (lap === TOTAL_LAPS);
    const poleH = 70;
    const bannerH = 22;

    // Road checkered stripe (2 rows)
    const sqW = Math.floor(rw / 12);
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 12; col++) {
        ctx.fillStyle = (col + row) % 2 === 0 ? '#fff' : '#111';
        ctx.fillRect(rx + col * sqW, sy - bannerH/2 + row * (bannerH/2), sqW, bannerH/2);
      }
    }

    // Left pole
    ctx.fillStyle = '#e53935';
    ctx.fillRect(rx - 12, sy - poleH, 10, poleH + 12);
    // Right pole
    ctx.fillRect(rx + rw + 2, sy - poleH, 10, poleH + 12);

    // Overhead banner connecting poles
    const bannerY = sy - poleH;
    ctx.fillStyle = isLastLap ? '#e53935' : '#1565c0';
    ctx.fillRect(rx - 2, bannerY, rw + 4, 16);
    // Banner checkers
    const bsq = 16;
    for (let col = 0; col < Math.floor((rw + 4) / bsq); col++) {
      if (col % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(rx - 2 + col * bsq, bannerY, bsq, 16);
      }
    }

    // Banner text
    ctx.fillStyle = '#fff';
    ctx.font = `bold 11px "Hiragino Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = isLastLap ? 'GOAL!!' : `LAP ${lap}`;
    ctx.fillText(label, rx + rw / 2, bannerY + 8);

    // Flag on left pole tip
    ctx.fillStyle = isLastLap ? '#ffd700' : '#fff';
    ctx.beginPath();
    ctx.moveTo(rx - 2,      bannerY);
    ctx.lineTo(rx - 2 + 22, bannerY + 10);
    ctx.lineTo(rx - 2,      bannerY + 20);
    ctx.closePath();
    ctx.fill();

    // Glow when close (within 200 dist)
    const distToLine = worldDist - playerDist;
    if (distToLine > 0 && distToLine < 220) {
      const alpha = (1 - distToLine / 220) * 0.5;
      ctx.fillStyle = `rgba(255,220,0,${alpha})`;
      ctx.fillRect(rx, sy - poleH, rw, poleH + 12);
    }
  }
}

// ---- Draw Decorations ----
function drawDecorations() {
  const H = canvas.height;
  decos.forEach(d => {
    const sy = worldToScreenY(d.worldDist, H);
    if (sy < -20 || sy > H + 20) return;
    const c = DECO_COLORS[d.colorIdx];
    ctx.fillStyle = c;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    if (d.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(d.x, sy, d.size, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Flower-like: inner lighter circle
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(d.x - d.size*0.2, sy - d.size*0.2, d.size*0.35, 0, Math.PI*2);
      ctx.fill();
    } else if (d.shape === 'tri') {
      ctx.beginPath();
      ctx.moveTo(d.x,           sy - d.size);
      ctx.lineTo(d.x + d.size,  sy + d.size);
      ctx.lineTo(d.x - d.size,  sy + d.size);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.roundRect(d.x - d.size, sy - d.size, d.size*2, d.size*2, 4);
      ctx.fill(); ctx.stroke();
    }
  });
}

// ---- Draw Stars ----
function drawStarShape(cx, cy, r, spin) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = spin + (i * 72 - 90) * Math.PI / 180;
    const a2 = spin + ((i * 72) + 36 - 90) * Math.PI / 180;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1))
            : ctx.lineTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
    ctx.lineTo(cx + r * 0.42 * Math.cos(a2), cy + r * 0.42 * Math.sin(a2));
  }
  ctx.closePath();
}

function drawStars() {
  const H = canvas.height;
  stars.forEach(s => {
    if (s.collected) return;
    const sy = worldToScreenY(s.worldDist, H);
    if (sy < -20 || sy > H + 20) return;
    const pulse = 1 + Math.sin(s.spin * 2) * 0.12;
    ctx.save();
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffd700';
    drawStarShape(s.x, sy, 14 * pulse, s.spin);
    ctx.fill();
    ctx.fillStyle = '#fff9c4';
    drawStarShape(s.x, sy, 7 * pulse, s.spin);
    ctx.fill();
    ctx.restore();
  });
}

// ---- Draw Car (shapes only, fast) ----
function drawCar(cx, cy, bodyColor, roofColor, label, isPlayer) {
  const cw = isPlayer ? 46 : 38;
  const ch = isPlayer ? 66 : 56;

  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(2, ch*0.38, cw*0.44, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-cw/2, -ch/2, cw, ch, 9);
  ctx.fill();

  // Roof
  ctx.fillStyle = roofColor;
  ctx.beginPath();
  ctx.roundRect(-cw/2+4, -ch/2+4, cw-8, ch*0.46, [7,7,0,0]);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(180,230,255,0.72)';
  ctx.beginPath();
  ctx.roundRect(-cw/2+7, -ch/2+6, cw-14, ch*0.25, [5,5,2,2]);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#212121';
  [[-cw/2-4, -ch/2+5], [cw/2-4, -ch/2+5],
   [-cw/2-4,  ch/2-14],[cw/2-4,  ch/2-14]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.roundRect(wx, wy, 8, 11, 3);
    ctx.fill();
    ctx.fillStyle = '#757575';
    ctx.beginPath();
    ctx.arc(wx+4, wy+5.5, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#212121';
  });

  // Headlights
  ctx.fillStyle = '#fff9c4';
  [[-cw/2+5, ch/2-9], [cw/2-13, ch/2-9]].forEach(([lx, ly]) => {
    ctx.beginPath();
    ctx.ellipse(lx+4, ly+3, 4.5, 3, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Horn (player only)
  if (isPlayer) {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-3, -ch/2 - 14);
    ctx.lineTo(0,  -ch/2 - 28);
    ctx.lineTo(3,  -ch/2 - 14);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ffb300';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Label (initial letter, fast text)
  ctx.fillStyle = isPlayer ? '#880e4f' : '#fff';
  ctx.font = `bold ${isPlayer ? 15 : 13}px "Hiragino Sans", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label[0], 0, -4);

  ctx.restore();
}

// ---- Draw Particles ----
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ---- Draw HUD ----
function drawHUD() {
  const W = canvas.width, H = canvas.height;
  const lapFrac = (playerDist % LAP_DIST) / LAP_DIST;
  const lapShow = Math.min(playerLap + 1, TOTAL_LAPS);

  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(W/2-130, 8, 260, 46, 14);
  ctx.fill();

  ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(`ラップ ${lapShow} / ${TOTAL_LAPS}`, W/2-120, 31);

  // Progress bar
  const bx = W/2-28, by = 21, bw = 100, bh = 14;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 6); ctx.fill();
  const grd = ctx.createLinearGradient(bx, 0, bx+bw, 0);
  grd.addColorStop(0, '#ff6ec7'); grd.addColorStop(1, '#ffd54f');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.roundRect(bx, by, bw * lapFrac, bh, 6); ctx.fill();

  ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'right'; ctx.fillStyle = '#ffd54f';
  ctx.fillText(`★ ${score}`, W/2+118, 31);

  // Speed boost meter (bottom-left)
  const meterW = 110, meterH = 18;
  const meterX = 10, meterY = H - 60;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(meterX, meterY, meterW + 50, meterH + 16, 10); ctx.fill();
  ctx.font = 'bold 11px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('スピード', meterX + 6, meterY + 12);
  // Bar bg
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(meterX + 54, meterY + 4, meterW, 10, 4); ctx.fill();
  // Bar fill
  const boostFrac = playerSpeedBoost / SPEED_BOOST_MAX;
  const speedGrd = ctx.createLinearGradient(meterX+54, 0, meterX+54+meterW, 0);
  speedGrd.addColorStop(0, '#42a5f5');
  speedGrd.addColorStop(0.5, '#66bb6a');
  speedGrd.addColorStop(1, '#ff6ec7');
  ctx.fillStyle = speedGrd;
  ctx.beginPath(); ctx.roundRect(meterX + 54, meterY + 4, meterW * boostFrac, 10, 4); ctx.fill();
  // Flame icon when fast
  if (boostFrac > 0.6) {
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🔥', meterX + 54 + meterW + 12, meterY + 12);
  }

  // Lap flash
  if (lapFlash > 0) {
    const alpha = Math.min(1, lapFlash) * Math.min(1, (2.5 - lapFlash) * 2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 28px "Hiragino Sans", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#7b1fa2'; ctx.lineWidth = 5;
    ctx.strokeText(lapMsg, W/2, H/2 - 40);
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(lapMsg, W/2, H/2 - 40);
    ctx.restore();
  }

  // Mini rank indicator
  const rw = getRoadW(), rx = getRoadX();
  // Count how many NPCs are ahead
  const ahead = npcs.filter(n => n.dist > playerDist).length;
  const rankNow = ahead + 1;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(W-70, 8, 62, 36, 10); ctx.fill();
  ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = rankNow === 1 ? '#ffd700' : '#fff';
  ctx.fillText(`${rankNow}い`, W-39, 26);
}

// ---- Draw Finish Screen ----
const medals = ['🥇','🥈','🥉','4'];
const rankMsgs = ['すごい！ 1いだ！！', 'やったー！ 2い！', 'がんばった！ 3い！', 'つぎは がんばろう！'];

function drawFinish() {
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  const bw = Math.min(W-32, 320), bh = 280;
  const bx = (W-bw)/2, by = (H-bh)/2;

  // Bounce
  const sc = 1 + Math.sin(finishT * 2.8) * 0.025;
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(sc, sc);
  ctx.translate(-W/2, -H/2);

  // Panel
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.roundRect(bx+5, by+5, bw, bh, 24); ctx.fill();
  const pg = ctx.createLinearGradient(bx, by, bx+bw, by+bh);
  pg.addColorStop(0, '#6a1b9a'); pg.addColorStop(0.5, '#c2185b'); pg.addColorStop(1, '#f06292');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Medal
  ctx.font = '54px serif';
  ctx.fillText(medals[Math.min(playerRank-1, 3)], W/2, by+58);

  ctx.font = `bold 22px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = ['#ffd700','#e0e0e0','#cd7f32','#90caf9'][Math.min(playerRank-1, 3)];
  ctx.fillText(rankMsgs[Math.min(playerRank-1, 3)], W/2, by+110);

  ctx.font = `16px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(`★ スコア: ${score}`, W/2, by+148);

  // Results list
  const allCars = [
    { name: 'ユニコーン', rank: playerRank },
    ...npcs.map((n, i) => ({ name: n.label, rank: n.finishRank || finishOrder.indexOf(i)+1 || 4 })),
  ].sort((a, b) => a.rank - b.rank);

  ctx.font = `13px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  allCars.forEach((c, i) => {
    ctx.textAlign = 'center';
    ctx.fillText(`${medals[Math.min(c.rank-1,3)]}  ${c.name}`, W/2, by+178 + i*22);
  });

  // Retry button
  const btnW = 200, btnH = 46;
  const btnX = W/2-btnW/2, btnY = by+bh-56;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 23); ctx.fill();
  ctx.font = `bold 16px "Hiragino Sans", sans-serif`;
  ctx.fillStyle = '#6a1b9a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🏁 もういちど！', W/2, btnY+23);
  ctx.restore();

  retryBtn.x = bx+(bw-btnW)/2; retryBtn.y = by+bh-56;
  retryBtn.w = btnW; retryBtn.h = btnH;
}

const retryBtn = { x:0, y:0, w:0, h:0 };
canvas.addEventListener('pointerdown', e => {
  if (gameState !== 'finished') return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (canvas.width / r.width);
  const my = (e.clientY - r.top)  * (canvas.height / r.height);
  if (mx>=retryBtn.x && mx<=retryBtn.x+retryBtn.w && my>=retryBtn.y && my<=retryBtn.y+retryBtn.h)
    init();
});

// ---- Main loop ----
function loop() {
  update();

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  drawRoad();
  drawFinishLines();
  drawDecorations();
  drawStars();

  // Draw all cars sorted by screen Y (further up = drawn first)
  const rw = getRoadW(), rx = getRoadX();
  const playerScreenY = H * 0.75;
  const allCars = [
    { screenY: playerScreenY,
      cx: rx + playerX * rw, isPlayer: true,
      bodyColor: '#e91e8c', roofColor: '#ad1457', label: 'ユニコーン' },
    ...npcs.map(n => ({
      screenY: worldToScreenY(n.dist, H),
      cx: rx + (n.x + Math.sin(n.wobble) * 0.04) * rw,
      isPlayer: false,
      bodyColor: n.bodyColor, roofColor: n.color, label: n.label,
    })),
  ];
  allCars.sort((a, b) => a.screenY - b.screenY);
  allCars.forEach(c => {
    if (c.screenY < -80 || c.screenY > H + 80) return;
    drawCar(c.cx, c.screenY, c.bodyColor, c.roofColor, c.label, c.isPlayer);
  });

  drawParticles();
  drawHUD();
  if (gameState === 'finished') drawFinish();

  requestAnimationFrame(loop);
}

init();
loop();
</script>
