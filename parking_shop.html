<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦄 ユニコーンのおかいもの</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d0d1a;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
}
canvas { display: block; width: 100%; flex: 1; min-height: 0; }
.controls {
  background: #0d0d1a;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  padding: 10px 20px 14px;
  height: 140px;
  flex-shrink: 0;
  align-items: center;
  justify-items: center;
}
.ctrl-btn {
  width: 58px;
  height: 58px;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,.2);
  font-size: 1.8rem;
  cursor: pointer;
  background: rgba(255,255,255,.1);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform .08s, background .08s;
}
.ctrl-btn:active { transform: scale(.85); background: rgba(255,255,255,.28); }
.ctrl-spacer { width: 58px; height: 58px; }
.home-btn {
  position: fixed;
  top: 10px; left: 10px;
  z-index: 50;
  padding: 7px 13px;
  font-size: .82rem;
  font-weight: 700;
  color: #7b1fa2;
  background: rgba(255,255,255,.88);
  border: 2px solid #ce93d8;
  border-radius: 22px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.home-btn:active { transform: scale(.95); }
</style>
</head>
<body>
<a href="index.html" class="home-btn">🏰 もどる</a>
<canvas id="game"></canvas>
<div class="controls">
  <div class="ctrl-spacer"></div>
  <button class="ctrl-btn" id="btnUp">⬆️</button>
  <div class="ctrl-spacer"></div>
  <button class="ctrl-btn" id="btnLeft">⬅️</button>
  <button class="ctrl-btn" id="btnDown">⬇️</button>
  <button class="ctrl-btn" id="btnRight">➡️</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- Resize ----
function resize() {
  const ctrl = document.querySelector('.controls');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - ctrl.offsetHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ---- Input ----
const keys = { up: false, down: false, left: false, right: false };

document.getElementById('btnUp').addEventListener('pointerdown', e => { e.preventDefault(); keys.up = true; });
document.getElementById('btnDown').addEventListener('pointerdown', e => { e.preventDefault(); keys.down = true; });
document.getElementById('btnLeft').addEventListener('pointerdown', e => { e.preventDefault(); keys.left = true; });
document.getElementById('btnRight').addEventListener('pointerdown', e => { e.preventDefault(); keys.right = true; });
['btnUp','btnDown','btnLeft','btnRight'].forEach(id => {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerup', () => { keys.up = keys.down = keys.left = keys.right = false; });
  btn.addEventListener('pointercancel', () => { keys.up = keys.down = keys.left = keys.right = false; });
  btn.addEventListener('pointerleave', () => { keys.up = keys.down = keys.left = keys.right = false; });
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
  if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
  if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// ---- World ----
const WORLD_W = 1200;
const WORLD_H = 1200;

// ---- Shops ----
const ALL_SHOPS = [
  { id: 'fruit',    emoji: '🍎', name: 'くだものや',     color: '#ff7043', bg: '#fff3e0' },
  { id: 'cake',     emoji: '🧁', name: 'ケーキや',       color: '#ec407a', bg: '#fce4ec' },
  { id: 'flower',   emoji: '🌸', name: 'おはなや',       color: '#ab47bc', bg: '#f3e5f5' },
  { id: 'ice',      emoji: '🍦', name: 'アイスクリームや', color: '#42a5f5', bg: '#e3f2fd' },
  { id: 'toy',      emoji: '🧸', name: 'おもちゃや',     color: '#66bb6a', bg: '#e8f5e9' },
  { id: 'book',     emoji: '📚', name: 'ほんや',         color: '#ffa726', bg: '#fff8e1' },
  { id: 'ribbon',   emoji: '🎀', name: 'リボンや',       color: '#f06292', bg: '#fce4ec' },
  { id: 'rainbow',  emoji: '🌈', name: 'にじいろや',     color: '#26c6da', bg: '#e0f7fa' },
];

// Fixed shop positions along edges
const SHOP_POSITIONS = [
  { x: 200, y: 80 },
  { x: 500, y: 80 },
  { x: 800, y: 80 },
  { x: 1100, y: 200 },
  { x: 1100, y: 600 },
  { x: 800, y: 1100 },
  { x: 400, y: 1100 },
  { x: 80,  y: 600 },
];

// Assign shops to positions
const shops = ALL_SHOPS.map((s, i) => ({
  ...s,
  x: SHOP_POSITIONS[i].x,
  y: SHOP_POSITIONS[i].y,
  w: 110, h: 90,
  collected: false,
  sparkle: 0,
  buyAnim: 0,
}));

// ---- Shopping list (pick 5 random) ----
function makeShoppingList() {
  const indices = [...Array(8).keys()];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices.slice(0, 5);
}
let shoppingList = makeShoppingList(); // indices into shops[]
let collectedCount = 0;

// ---- Parking lot layout ----
// Parking lines
function makeParkingLines() {
  const lines = [];
  // Horizontal rows
  const rowY = [250, 430, 610, 790, 960];
  for (const ry of rowY) {
    for (let x = 160; x < 1100; x += 70) {
      lines.push({ x, y: ry, w: 60, h: 38, angle: 0 });
    }
  }
  return lines;
}
const parkingLines = makeParkingLines();

// ---- Player ----
const player = {
  x: WORLD_W / 2,
  y: WORLD_H / 2,
  angle: 0,    // facing direction in radians
  speed: 0,
  maxSpeed: 4.5,
  accel: 0.4,
  friction: 0.85,
  w: 44,
  h: 26,
};

// ---- Camera ----
const cam = { x: 0, y: 0 };

// ---- Particles ----
const particles = [];

function spawnBuyParticles(wx, wy, emoji) {
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    particles.push({
      x: wx, y: wy,
      vx: Math.cos(a) * (2 + Math.random() * 3),
      vy: Math.sin(a) * (2 + Math.random() * 3),
      life: 1.0,
      emoji: i % 3 === 0 ? emoji : '✨',
      size: 16 + Math.random() * 12,
    });
  }
}

// ---- Stars for celebration ----
const stars = [];
function spawnStars() {
  for (let i = 0; i < 40; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - .5) * 6,
      vy: (Math.random() - .5) * 6,
      life: 1.0,
      size: 18 + Math.random() * 24,
      emoji: ['🌟','✨','🎉','🎊','⭐'][Math.floor(Math.random() * 5)],
    });
  }
}

// ---- Game state ----
let gameState = 'playing'; // 'playing' | 'clear'
let clearTimer = 0;
let clearAnimT = 0;

// ---- Update ----
function update() {
  if (gameState !== 'playing') {
    clearAnimT += 0.04;
    // Animate stars
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.x += s.vx; s.y += s.vy;
      s.vy += 0.15;
      s.life -= 0.01;
      if (s.life <= 0) stars.splice(i, 1);
    }
    if (stars.length < 20) spawnStars();
    return;
  }

  // Player movement (tank controls)
  const turnSpeed = 0.06;
  if (keys.left)  player.angle -= turnSpeed;
  if (keys.right) player.angle += turnSpeed;
  if (keys.up)    player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
  else if (keys.down) player.speed = Math.max(player.speed - player.accel, -player.maxSpeed * 0.6);
  else player.speed *= player.friction;
  if (Math.abs(player.speed) < 0.05) player.speed = 0;

  const newX = player.x + Math.cos(player.angle) * player.speed;
  const newY = player.y + Math.sin(player.angle) * player.speed;

  // Boundary
  player.x = Math.max(30, Math.min(WORLD_W - 30, newX));
  player.y = Math.max(30, Math.min(WORLD_H - 30, newY));

  // Camera follows player
  const cw = canvas.width, ch = canvas.height;
  cam.x = player.x - cw / 2;
  cam.y = player.y - ch / 2;
  cam.x = Math.max(0, Math.min(WORLD_W - cw, cam.x));
  cam.y = Math.max(0, Math.min(WORLD_H - ch, cam.y));

  // Check shop proximity
  shops.forEach((shop, idx) => {
    if (shop.collected) return;
    const dx = player.x - shop.x, dy = player.y - shop.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 75) {
      shop.sparkle += 0.15;
      // Auto-collect when very close and on shopping list
      if (dist < 55 && shoppingList.includes(idx)) {
        shop.collected = true;
        shop.buyAnim = 1.0;
        collectedCount++;
        spawnBuyParticles(shop.x, shop.y, shop.emoji);
        if (collectedCount >= 5) {
          gameState = 'clear';
          clearTimer = 0;
          spawnStars();
        }
      }
    } else {
      shop.sparkle = Math.max(0, shop.sparkle - 0.1);
    }
  });

  // Update buy anims
  shops.forEach(s => { if (s.buyAnim > 0) s.buyAnim -= 0.04; });

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---- Draw helpers ----
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

// ---- Draw World ----
function drawWorld() {
  const W = WORLD_W, H = WORLD_H;

  // Asphalt background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#424242');
  bg.addColorStop(1, '#37474f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Road pattern (subtle grid)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 80) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Parking lot area (lighter center)
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(140, 200, 920, 820);

  // Parking lines
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  parkingLines.forEach(pl => {
    ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
  });

  // Driving lane arrows
  ctx.fillStyle = 'rgba(255,255,0,0.18)';
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  [[600, 340], [600, 520], [600, 700], [600, 880]].forEach(([ax, ay]) => {
    ctx.fillText('→', ax, ay);
    ctx.fillText('←', ax - 100, ay);
  });

  // Border / curb
  ctx.strokeStyle = '#ffcc02';
  ctx.lineWidth = 4;
  ctx.strokeRect(8, 8, W - 16, H - 16);

  // Grass corners
  const corners = [
    [0, 0, 130, 200], [W - 130, 0, 130, 200],
    [0, H - 150, 130, 150], [W - 130, H - 150, 130, 150],
  ];
  ctx.fillStyle = '#388e3c';
  corners.forEach(([cx, cy, cw, ch]) => ctx.fillRect(cx, cy, cw, ch));

  // Trees in corners
  const treePos = [[65, 100], [W - 65, 100], [65, H - 75], [W - 65, H - 75]];
  treePos.forEach(([tx, ty]) => {
    // trunk
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(tx - 6, ty - 4, 12, 20);
    // foliage
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath(); ctx.arc(tx, ty - 14, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#43a047';
    ctx.beginPath(); ctx.arc(tx - 6, ty - 20, 15, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx + 6, ty - 22, 13, 0, Math.PI * 2); ctx.fill();
  });

  // Shops
  shops.forEach((shop, idx) => {
    const isOnList = shoppingList.includes(idx);
    const sx = shop.x - shop.w / 2, sy = shop.y - shop.h / 2;

    // Glow if on list and not collected
    if (isOnList && !shop.collected) {
      const glowR = 55 + Math.sin(Date.now() * 0.004) * 10;
      const grd = ctx.createRadialGradient(shop.x, shop.y, 10, shop.x, shop.y, glowR);
      grd.addColorStop(0, shop.color + '66');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(shop.x, shop.y, glowR, 0, Math.PI * 2); ctx.fill();
    }

    // Shop building
    ctx.save();
    if (shop.buyAnim > 0) {
      const sc = 1 + shop.buyAnim * 0.3;
      ctx.translate(shop.x, shop.y);
      ctx.scale(sc, sc);
      ctx.translate(-shop.x, -shop.y);
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    drawRoundRect(sx + 4, sy + 4, shop.w, shop.h, 12);
    ctx.fill();

    // Building body
    ctx.fillStyle = shop.collected ? '#90a4ae' : shop.bg;
    drawRoundRect(sx, sy, shop.w, shop.h, 12);
    ctx.fill();
    ctx.strokeStyle = shop.collected ? '#607d8b' : shop.color;
    ctx.lineWidth = 3;
    drawRoundRect(sx, sy, shop.w, shop.h, 12);
    ctx.stroke();

    // Awning
    ctx.fillStyle = shop.color;
    drawRoundRect(sx, sy, shop.w, 22, [12, 12, 0, 0]);
    ctx.fill();
    // Awning stripes
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let si = 0; si < 4; si++) {
      ctx.fillRect(sx + 12 + si * 22, sy, 10, 22);
    }

    // Emoji
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = shop.collected ? 0.35 : 1.0;
    ctx.fillText(shop.emoji, shop.x, shop.y + 14);
    ctx.globalAlpha = 1.0;

    // Shop name
    ctx.font = 'bold 10px "Hiragino Sans", sans-serif';
    ctx.fillStyle = shop.collected ? '#78909c' : '#424242';
    ctx.fillText(shop.name, shop.x, sy + shop.h - 8);

    // Collected checkmark
    if (shop.collected) {
      ctx.font = '28px serif';
      ctx.globalAlpha = 0.8;
      ctx.fillText('✅', sx + shop.w - 6, sy + 6);
      ctx.globalAlpha = 1.0;
    }

    ctx.restore();

    // Sparkle ring when near
    if (shop.sparkle > 0 && !shop.collected) {
      ctx.strokeStyle = shop.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = shop.sparkle * 0.8;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.arc(shop.x, shop.y, 58 + Math.sin(Date.now() * 0.006) * 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1.0;

      // "ここ！" prompt
      if (isOnList) {
        ctx.fillStyle = '#fff176';
        ctx.font = 'bold 14px "Hiragino Sans", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('ここ！', shop.x, sy - 18);
      }
    }
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, p.x, p.y);
    ctx.globalAlpha = 1.0;
  });
}

// ---- Draw Player Car ----
function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle + Math.PI / 2);

  const cw = player.w, ch = player.h;

  // Car shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundRect(-cw / 2 + 3, -ch / 2 + 3, cw, ch, 8);
  ctx.fill();

  // Car body
  const carGrd = ctx.createLinearGradient(-cw / 2, 0, cw / 2, 0);
  carGrd.addColorStop(0, '#e91e8c');
  carGrd.addColorStop(.5, '#ff6ec7');
  carGrd.addColorStop(1, '#e91e8c');
  ctx.fillStyle = carGrd;
  drawRoundRect(-cw / 2, -ch / 2, cw, ch, 8);
  ctx.fill();

  // Car roof
  ctx.fillStyle = '#ad1457';
  drawRoundRect(-cw / 2 + 6, -ch / 2 + 6, cw - 12, ch - 12, 5);
  ctx.fill();

  // Windows (front)
  ctx.fillStyle = 'rgba(180,230,255,0.7)';
  drawRoundRect(-cw / 2 + 8, -ch / 2 + 4, cw - 16, 10, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#212121';
  [[-cw / 2 - 3, -ch / 2 + 2], [cw / 2 - 5, -ch / 2 + 2],
   [-cw / 2 - 3,  ch / 2 - 8], [cw / 2 - 5,  ch / 2 - 8]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.roundRect(wx, wy, 8, 6, 2);
    ctx.fill();
  });

  // Headlights
  ctx.fillStyle = '#fff9c4';
  [[-cw / 2 + 3, -ch / 2 - 3], [cw / 2 - 9, -ch / 2 - 3]].forEach(([lx, ly]) => {
    ctx.beginPath();
    ctx.ellipse(lx + 3, ly + 2, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // Unicorn on top of car
  ctx.translate(0, -4);

  // Unicorn body (tiny)
  ctx.fillStyle = '#f8bbd0';
  ctx.beginPath();
  ctx.ellipse(0, 3, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(0, -5, 7, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Horn
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-2, -5);
  ctx.stroke();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(-3, -6);
  ctx.lineTo(2, -6);
  ctx.closePath();
  ctx.fill();

  // Mane (rainbow)
  const maneColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#cc5de8'];
  maneColors.forEach((mc, mi) => {
    ctx.fillStyle = mc;
    ctx.beginPath();
    ctx.arc(-4 + mi * 1.5, -5 - mi, 3 - mi * 0.3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Eye
  ctx.fillStyle = '#880e4f';
  ctx.beginPath();
  ctx.arc(3, -6, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ---- Draw HUD ----
function drawHUD() {
  // Shopping list panel
  const pw = 180, ph = 30 + shoppingList.length * 34 + 14;
  const px = 10, py = 50;

  // Panel BG
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  drawRoundRect(px, py, pw, ph, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,200,255,0.4)';
  ctx.lineWidth = 2;
  drawRoundRect(px, py, pw, ph, 14);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('🛒 かいものリスト', px + 12, py + 18);

  shoppingList.forEach((shopIdx, i) => {
    const shop = shops[shopIdx];
    const iy = py + 34 + i * 34;
    const done = shop.collected;

    ctx.fillStyle = done ? 'rgba(100,200,100,0.25)' : 'rgba(255,255,255,0.08)';
    drawRoundRect(px + 8, iy - 12, pw - 16, 28, 8);
    ctx.fill();

    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = done ? 0.5 : 1.0;
    ctx.fillText(shop.emoji, px + 26, iy + 2);
    ctx.globalAlpha = 1.0;

    ctx.font = `${done ? 'normal' : 'bold'} 12px "Hiragino Sans", sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillStyle = done ? '#81c784' : '#fff';
    ctx.fillText(shop.name, px + 40, iy + 2);

    if (done) {
      ctx.font = '16px serif';
      ctx.textAlign = 'right';
      ctx.fillText('✅', px + pw - 10, iy + 2);
    }
  });

  // Progress
  const barY = py + ph + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  drawRoundRect(px, barY, pw, 20, 8);
  ctx.fill();
  if (collectedCount > 0) {
    const grd = ctx.createLinearGradient(px, 0, px + pw, 0);
    grd.addColorStop(0, '#ff6ec7');
    grd.addColorStop(1, '#ffcc02');
    ctx.fillStyle = grd;
    drawRoundRect(px + 2, barY + 2, (pw - 4) * (collectedCount / 5), 16, 6);
    ctx.fill();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px "Hiragino Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${collectedCount} / 5`, px + pw / 2, barY + 10);
}

// ---- Draw Clear Screen ----
function drawClear() {
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.font = `${s.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.emoji, s.x, s.y);
    ctx.globalAlpha = 1.0;
  });

  const cw = canvas.width, ch = canvas.height;
  const bw = 320, bh = 220;
  const bx = (cw - bw) / 2, by = (ch - bh) / 2;

  // Panel with bounce
  const sc = 1 + Math.sin(clearAnimT * 3) * 0.03;
  ctx.save();
  ctx.translate(cw / 2, ch / 2);
  ctx.scale(sc, sc);
  ctx.translate(-cw / 2, -ch / 2);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  drawRoundRect(bx + 6, by + 6, bw, bh, 24);
  ctx.fill();

  // Panel
  const panelGrd = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
  panelGrd.addColorStop(0, '#7b1fa2');
  panelGrd.addColorStop(.5, '#e91e63');
  panelGrd.addColorStop(1, '#ff6ec7');
  ctx.fillStyle = panelGrd;
  drawRoundRect(bx, by, bw, bh, 24);
  ctx.fill();

  ctx.strokeStyle = '#fff9';
  ctx.lineWidth = 3;
  drawRoundRect(bx, by, bw, bh, 24);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = '64px serif';
  ctx.fillText('🎉', cw / 2, by + 55);

  ctx.font = 'bold 26px "Hiragino Sans", sans-serif';
  ctx.fillStyle = '#fff9c4';
  ctx.fillText('おかいもの かんりょう！', cw / 2, by + 110);

  ctx.font = '16px "Hiragino Sans", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('ぜんぶ かえたよ！すごい！✨', cw / 2, by + 145);

  // Retry button
  const btnW = 170, btnH = 44;
  const btnX = cw / 2 - btnW / 2, btnY = by + bh - 60;
  ctx.fillStyle = '#fff';
  drawRoundRect(btnX, btnY, btnW, btnH, 22);
  ctx.fill();
  ctx.font = 'bold 16px "Hiragino Sans", sans-serif';
  ctx.fillStyle = '#7b1fa2';
  ctx.fillText('🛒 もういちど', cw / 2, btnY + 22);

  ctx.restore();

  // Store button bounds for click
  clearRetryBtn.x = bx + (bw - 170) / 2;
  clearRetryBtn.y = by + bh - 60;
  clearRetryBtn.w = 170;
  clearRetryBtn.h = 44;
}

const clearRetryBtn = { x: 0, y: 0, w: 170, h: 44 };

canvas.addEventListener('pointerdown', e => {
  if (gameState !== 'clear') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  if (mx >= clearRetryBtn.x && mx <= clearRetryBtn.x + clearRetryBtn.w &&
      my >= clearRetryBtn.y && my <= clearRetryBtn.y + clearRetryBtn.h) {
    resetGame();
  }
});

function resetGame() {
  player.x = WORLD_W / 2;
  player.y = WORLD_H / 2;
  player.angle = 0;
  player.speed = 0;
  shops.forEach(s => { s.collected = false; s.sparkle = 0; s.buyAnim = 0; });
  shoppingList = makeShoppingList();
  collectedCount = 0;
  particles.length = 0;
  stars.length = 0;
  gameState = 'playing';
  clearAnimT = 0;
}

// ---- Main Loop ----
function loop() {
  update();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  drawWorld();
  drawPlayer();
  ctx.restore();

  drawHUD();
  if (gameState === 'clear') drawClear();

  requestAnimationFrame(loop);
}

loop();
</script>
