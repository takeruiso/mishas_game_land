<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 いろぬりアドベンチャー 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: linear-gradient(135deg, #fff3e0, #fce4ec, #f3e5f5, #e8eaf6);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .home-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    font-size: 1rem;
    font-weight: 700;
    color: #e65100;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(8px);
    border: 2px solid #ffcc80;
    border-radius: 30px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 3px 12px rgba(230,81,0,.15);
    transition: transform .15s, box-shadow .15s;
  }

  .home-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 5px 18px rgba(230,81,0,.3);
  }

  /* Header */
  .header {
    text-align: center;
    padding: 18px 10px 8px;
  }

  .header h1 {
    font-size: 1.9rem;
    color: #e65100;
    text-shadow: 2px 2px 4px rgba(230,81,0,.2);
    letter-spacing: 2px;
  }

  .picture-label {
    font-size: 1rem;
    color: #bf360c;
    margin-top: 4px;
    font-weight: 600;
  }

  /* Main layout */
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 10px 30px;
    max-width: 700px;
    margin: 0 auto;
  }

  /* Canvas area */
  .canvas-wrap {
    position: relative;
    background: white;
    border-radius: 20px;
    padding: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,.1);
    border: 3px solid #ffcc80;
    margin-bottom: 14px;
  }

  #artCanvas {
    display: block;
    border-radius: 14px;
    cursor: pointer;
    touch-action: none;
    max-width: 100%;
    height: auto;
  }

  /* Palette */
  .palette-section {
    width: 100%;
    max-width: 520px;
    text-align: center;
    margin-bottom: 10px;
  }

  .palette-section p {
    font-size: .9rem;
    color: #bf360c;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    background: rgba(255,255,255,.6);
    border-radius: 16px;
    padding: 12px;
  }

  .color-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.8);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    position: relative;
  }

  .color-btn:hover {
    transform: scale(1.15);
  }

  .color-btn.active {
    transform: scale(1.2);
    border-color: #333;
    box-shadow: 0 0 0 3px rgba(0,0,0,.2), 0 4px 14px rgba(0,0,0,.25);
  }

  .color-btn.active::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 900;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,.5);
  }

  /* Tool buttons */
  .tools {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
  }

  .tool-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: .95rem;
    font-weight: 700;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 3px 10px rgba(0,0,0,.15);
  }

  .tool-btn:hover {
    transform: scale(1.06);
  }

  .btn-eraser {
    background: linear-gradient(135deg, #78909c, #546e7a);
  }

  .btn-undo {
    background: linear-gradient(135deg, #ff8a65, #e64a19);
  }

  .btn-clear {
    background: linear-gradient(135deg, #ef5350, #c62828);
  }

  .btn-next {
    background: linear-gradient(135deg, #66bb6a, #2e7d32);
  }

  .btn-save {
    background: linear-gradient(135deg, #42a5f5, #1565c0);
  }

  /* Celebration */
  .sparkle-text {
    display: none;
    text-align: center;
    font-size: 1.3rem;
    color: #e65100;
    font-weight: 700;
    margin: 8px 0;
    animation: sparkleAnim 1s ease infinite alternate;
  }

  .sparkle-text.show { display: block; }

  @keyframes sparkleAnim {
    0% { opacity: .7; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 6px 0 12px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(0,0,0,.12);
    transition: background .3s, transform .3s;
  }

  .dot.done {
    background: #66bb6a;
    transform: scale(1.15);
  }

  .dot.current {
    background: #ff9800;
    transform: scale(1.25);
    box-shadow: 0 0 8px rgba(255,152,0,.5);
  }

  /* Floating deco */
  .floater {
    position: fixed;
    font-size: 1.5rem;
    opacity: .14;
    pointer-events: none;
    animation: floatUp 10s linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: .14; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  @media (max-width: 550px) {
    .header h1 { font-size: 1.4rem; }
    .color-btn { width: 36px; height: 36px; }
    .tool-btn { padding: 8px 14px; font-size: .85rem; }
  }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏰 もどる</a>

<div class="header">
  <h1>🎨 いろぬりアドベンチャー 🖌️</h1>
  <div class="picture-label" id="pictureLabel">🌸 おはな 🌸</div>
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="game-area">
  <div class="palette-section">
    <p>🎨 すきな いろを えらんでね 🎨</p>
    <div class="palette" id="palette"></div>
  </div>

  <div class="tools">
    <button class="tool-btn btn-eraser" id="btnEraser">🧹 けしゴム</button>
    <button class="tool-btn btn-undo" id="btnUndo">↩️ もどす</button>
    <button class="tool-btn btn-clear" id="btnClear">🗑️ ぜんぶけす</button>
    <button class="tool-btn btn-next" id="btnNext">➡️ つぎのえ</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="artCanvas" width="480" height="480"></canvas>
  </div>

  <div class="sparkle-text" id="sparkleText">✨ きれいに ぬれたね！✨</div>
</div>

<script>
// ============ COLOR PALETTE ============
const COLORS = [
  { name: 'あか',     hex: '#ef5350' },
  { name: 'ピンク',   hex: '#f48fb1' },
  { name: 'オレンジ', hex: '#ff9800' },
  { name: 'きいろ',   hex: '#ffee58' },
  { name: 'きみどり', hex: '#aed581' },
  { name: 'みどり',   hex: '#66bb6a' },
  { name: 'みずいろ', hex: '#4fc3f7' },
  { name: 'あお',     hex: '#42a5f5' },
  { name: 'むらさき', hex: '#ab47bc' },
  { name: 'ちゃいろ', hex: '#8d6e63' },
  { name: 'しろ',     hex: '#ffffff' },
  { name: 'くろ',     hex: '#424242' },
];

let currentColor = COLORS[0].hex;
let isEraser = false;

// ============ PICTURES (region-based coloring) ============

// Each picture: { label, regions: [{ path(ctx, w, h), fill }], outline(ctx, w, h) }
// We define "regions" as large clickable areas, and "outline" as the line art drawn on top.

function makePictures() {
  const W = 480, H = 480;
  return [
    // ---- 1. Flower ----
    {
      label: '🌸 おはな 🌸',
      bgColor: '#f1f8e9',
      regions: buildFlowerRegions(W, H),
      drawOutline: (ctx) => drawFlowerOutline(ctx, W, H),
    },
    // ---- 2. Butterfly ----
    {
      label: '🦋 ちょうちょ 🦋',
      bgColor: '#e8f5e9',
      regions: buildButterflyRegions(W, H),
      drawOutline: (ctx) => drawButterflyOutline(ctx, W, H),
    },
    // ---- 3. Cat ----
    {
      label: '🐱 ねこちゃん 🐱',
      bgColor: '#fff3e0',
      regions: buildCatRegions(W, H),
      drawOutline: (ctx) => drawCatOutline(ctx, W, H),
    },
    // ---- 4. Unicorn ----
    {
      label: '🦄 ユニコーン 🦄',
      bgColor: '#fce4ec',
      regions: buildUnicornRegions(W, H),
      drawOutline: (ctx) => drawUnicornOutline(ctx, W, H),
    },
    // ---- 5. Castle ----
    {
      label: '🏰 おしろ 🏰',
      bgColor: '#e8eaf6',
      regions: buildCastleRegions(W, H),
      drawOutline: (ctx) => drawCastleOutline(ctx, W, H),
    },
    // ---- 6. Rainbow ----
    {
      label: '🌈 にじ 🌈',
      bgColor: '#e0f7fa',
      regions: buildRainbowRegions(W, H),
      drawOutline: (ctx) => drawRainbowOutline(ctx, W, H),
    },
  ];
}

// ============ FLOWER ============
function buildFlowerRegions(W, H) {
  const cx = W/2, cy = H/2 - 20, r = 60;
  const regions = [];
  // Petals
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 90) * Math.PI / 180;
    const px = cx + r * Math.cos(a);
    const py = cy + r * Math.sin(a);
    regions.push({
      type: 'ellipse', cx: px, cy: py, rx: 52, ry: 52, fill: null, label: 'petal' + i
    });
  }
  // Center
  regions.push({ type: 'ellipse', cx: cx, cy: cy, rx: 40, ry: 40, fill: null, label: 'center' });
  // Stem
  regions.push({ type: 'rect', x: cx - 12, y: cy + 55, w: 24, h: 160, fill: null, label: 'stem' });
  // Left leaf
  regions.push({ type: 'ellipse', cx: cx - 50, cy: cy + 130, rx: 42, ry: 20, rotation: -0.5, fill: null, label: 'leafL' });
  // Right leaf
  regions.push({ type: 'ellipse', cx: cx + 50, cy: cy + 110, rx: 42, ry: 20, rotation: 0.5, fill: null, label: 'leafR' });
  return regions;
}

function drawFlowerOutline(ctx, W, H) {
  const cx = W/2, cy = H/2 - 20, r = 60;
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';

  // Petals
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 90) * Math.PI / 180;
    const px = cx + r * Math.cos(a);
    const py = cy + r * Math.sin(a);
    ctx.beginPath();
    ctx.ellipse(px, py, 52, 52, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Center
  ctx.beginPath();
  ctx.ellipse(cx, cy, 40, 40, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Smiley face in center
  ctx.lineWidth = 2.5;
  // Eyes
  ctx.fillStyle = '#5d4037';
  ctx.beginPath(); ctx.ellipse(cx - 12, cy - 6, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 12, cy - 6, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  // Smile
  ctx.beginPath(); ctx.arc(cx, cy + 4, 14, .15, Math.PI - .15); ctx.stroke();
  // Cheeks
  ctx.fillStyle = 'rgba(244,143,177,.3)';
  ctx.beginPath(); ctx.ellipse(cx - 22, cy + 6, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 22, cy + 6, 8, 5, 0, 0, Math.PI*2); ctx.fill();

  ctx.lineWidth = 3;
  // Stem
  ctx.beginPath();
  ctx.roundRect(cx - 12, cy + 55, 24, 160, 6);
  ctx.stroke();
  // Leaves
  ctx.beginPath();
  ctx.ellipse(cx - 50, cy + 130, 42, 20, -0.5, 0, Math.PI * 2);
  ctx.stroke();
  // Leaf vein
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 85, cy + 140);
  ctx.lineTo(cx - 15, cy + 120);
  ctx.stroke();

  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx + 50, cy + 110, 42, 20, 0.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + 15, cy + 100);
  ctx.lineTo(cx + 85, cy + 120);
  ctx.stroke();
}

// ============ BUTTERFLY ============
function buildButterflyRegions(W, H) {
  const cx = W/2, cy = H/2;
  return [
    // Body
    { type: 'ellipse', cx: cx, cy: cy, rx: 18, ry: 70, fill: null, label: 'body' },
    // Top left wing
    { type: 'ellipse', cx: cx - 95, cy: cy - 50, rx: 85, ry: 70, rotation: -0.3, fill: null, label: 'wingTL' },
    // Top right wing
    { type: 'ellipse', cx: cx + 95, cy: cy - 50, rx: 85, ry: 70, rotation: 0.3, fill: null, label: 'wingTR' },
    // Bottom left wing
    { type: 'ellipse', cx: cx - 70, cy: cy + 55, rx: 60, ry: 50, rotation: -0.4, fill: null, label: 'wingBL' },
    // Bottom right wing
    { type: 'ellipse', cx: cx + 70, cy: cy + 55, rx: 60, ry: 50, rotation: 0.4, fill: null, label: 'wingBR' },
    // Wing spots
    { type: 'ellipse', cx: cx - 95, cy: cy - 50, rx: 30, ry: 25, fill: null, label: 'spotTL' },
    { type: 'ellipse', cx: cx + 95, cy: cy - 50, rx: 30, ry: 25, fill: null, label: 'spotTR' },
    { type: 'ellipse', cx: cx - 68, cy: cy + 52, rx: 20, ry: 16, fill: null, label: 'spotBL' },
    { type: 'ellipse', cx: cx + 68, cy: cy + 52, rx: 20, ry: 16, fill: null, label: 'spotBR' },
  ];
}

function drawButterflyOutline(ctx, W, H) {
  const cx = W/2, cy = H/2;
  ctx.strokeStyle = '#4a148c';
  ctx.lineWidth = 3;

  // Wings
  ctx.beginPath(); ctx.ellipse(cx - 95, cy - 50, 85, 70, -0.3, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 95, cy - 50, 85, 70, 0.3, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx - 70, cy + 55, 60, 50, -0.4, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 70, cy + 55, 60, 50, 0.4, 0, Math.PI*2); ctx.stroke();

  // Wing patterns (circles inside)
  ctx.beginPath(); ctx.ellipse(cx - 95, cy - 50, 30, 25, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 95, cy - 50, 30, 25, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx - 68, cy + 52, 20, 16, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 68, cy + 52, 20, 16, 0, 0, Math.PI*2); ctx.stroke();

  // Body
  ctx.beginPath(); ctx.ellipse(cx, cy, 18, 70, 0, 0, Math.PI*2); ctx.stroke();

  // Head
  ctx.beginPath(); ctx.arc(cx, cy - 78, 20, 0, Math.PI*2); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#4a148c';
  ctx.beginPath(); ctx.arc(cx - 8, cy - 82, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 8, cy - 82, 4, 0, Math.PI*2); ctx.fill();
  // Smile
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy - 72, 8, .2, Math.PI-.2); ctx.stroke();
  // Antennae
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx - 6, cy - 95); ctx.bezierCurveTo(cx - 20, cy - 140, cx - 40, cy - 140, cx - 45, cy - 130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 6, cy - 95); ctx.bezierCurveTo(cx + 20, cy - 140, cx + 40, cy - 140, cx + 45, cy - 130); ctx.stroke();
  ctx.fillStyle = '#4a148c';
  ctx.beginPath(); ctx.arc(cx - 45, cy - 130, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 45, cy - 130, 5, 0, Math.PI*2); ctx.fill();
}

// ============ CAT ============
function buildCatRegions(W, H) {
  const cx = W/2, cy = H/2 + 20;
  return [
    // Body
    { type: 'ellipse', cx: cx, cy: cy + 40, rx: 100, ry: 80, fill: null, label: 'body' },
    // Head
    { type: 'ellipse', cx: cx, cy: cy - 65, rx: 80, ry: 70, fill: null, label: 'head' },
    // Left ear
    { type: 'triangle', points: [[cx-60, cy-110],[cx-85, cy-185],[cx-20, cy-130]], fill: null, label: 'earL' },
    // Right ear
    { type: 'triangle', points: [[cx+60, cy-110],[cx+85, cy-185],[cx+20, cy-130]], fill: null, label: 'earR' },
    // Inner ear L
    { type: 'triangle', points: [[cx-55, cy-115],[cx-75, cy-170],[cx-28, cy-130]], fill: null, label: 'earIL' },
    // Inner ear R
    { type: 'triangle', points: [[cx+55, cy-115],[cx+75, cy-170],[cx+28, cy-130]], fill: null, label: 'earIR' },
    // Nose
    { type: 'ellipse', cx: cx, cy: cy - 45, rx: 10, ry: 8, fill: null, label: 'nose' },
    // Tail
    { type: 'ellipse', cx: cx + 120, cy: cy + 20, rx: 60, ry: 18, rotation: -0.6, fill: null, label: 'tail' },
    // Paws
    { type: 'ellipse', cx: cx - 50, cy: cy + 115, rx: 28, ry: 16, fill: null, label: 'pawL' },
    { type: 'ellipse', cx: cx + 50, cy: cy + 115, rx: 28, ry: 16, fill: null, label: 'pawR' },
  ];
}

function drawCatOutline(ctx, W, H) {
  const cx = W/2, cy = H/2 + 20;
  ctx.strokeStyle = '#4e342e';
  ctx.lineWidth = 3;

  // Body
  ctx.beginPath(); ctx.ellipse(cx, cy + 40, 100, 80, 0, 0, Math.PI*2); ctx.stroke();
  // Head
  ctx.beginPath(); ctx.ellipse(cx, cy - 65, 80, 70, 0, 0, Math.PI*2); ctx.stroke();

  // Ears
  ctx.beginPath(); ctx.moveTo(cx-60, cy-110); ctx.lineTo(cx-85, cy-185); ctx.lineTo(cx-20, cy-130); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+60, cy-110); ctx.lineTo(cx+85, cy-185); ctx.lineTo(cx+20, cy-130); ctx.closePath(); ctx.stroke();
  // Inner ears
  ctx.beginPath(); ctx.moveTo(cx-55, cy-115); ctx.lineTo(cx-75, cy-170); ctx.lineTo(cx-28, cy-130); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+55, cy-115); ctx.lineTo(cx+75, cy-170); ctx.lineTo(cx+28, cy-130); ctx.closePath(); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#4e342e';
  ctx.beginPath(); ctx.ellipse(cx - 30, cy - 75, 12, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - 26, cy - 79, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4e342e';
  ctx.beginPath(); ctx.ellipse(cx + 30, cy - 75, 12, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx + 34, cy - 79, 4, 0, Math.PI*2); ctx.fill();

  // Nose
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx - 8, cy - 48); ctx.lineTo(cx, cy - 38); ctx.lineTo(cx + 8, cy - 48); ctx.closePath(); ctx.stroke();

  // Mouth
  ctx.beginPath(); ctx.moveTo(cx, cy - 38); ctx.lineTo(cx, cy - 28); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx - 12, cy - 26, 12, -.3, Math.PI * .1); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + 12, cy - 26, 12, Math.PI * .9, Math.PI + .3); ctx.stroke();

  // Whiskers
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx - 35, cy - 50); ctx.lineTo(cx - 90, cy - 60); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 35, cy - 40); ctx.lineTo(cx - 90, cy - 38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 35, cy - 30); ctx.lineTo(cx - 85, cy - 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 35, cy - 50); ctx.lineTo(cx + 90, cy - 60); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 35, cy - 40); ctx.lineTo(cx + 90, cy - 38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 35, cy - 30); ctx.lineTo(cx + 85, cy - 16); ctx.stroke();

  // Cheeks
  ctx.fillStyle = 'rgba(244,143,177,.25)';
  ctx.beginPath(); ctx.ellipse(cx - 50, cy - 50, 14, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 50, cy - 50, 14, 10, 0, 0, Math.PI*2); ctx.fill();

  ctx.lineWidth = 3;
  // Tail
  ctx.beginPath();
  ctx.moveTo(cx + 90, cy + 60);
  ctx.bezierCurveTo(cx + 150, cy + 30, cx + 180, cy - 20, cx + 150, cy - 30);
  ctx.stroke();

  // Paws
  ctx.beginPath(); ctx.ellipse(cx - 50, cy + 115, 28, 16, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 50, cy + 115, 28, 16, 0, 0, Math.PI*2); ctx.stroke();
  // Paw lines
  ctx.lineWidth = 1.5;
  [-50, 50].forEach(dx => {
    for (let j = -1; j <= 1; j++) {
      ctx.beginPath(); ctx.moveTo(cx + dx + j * 9, cy + 107); ctx.lineTo(cx + dx + j * 9, cy + 120); ctx.stroke();
    }
  });
}

// ============ UNICORN ============
function buildUnicornRegions(W, H) {
  const cx = W/2, cy = H/2 + 30;
  return [
    // Body
    { type: 'ellipse', cx: cx - 10, cy: cy, rx: 110, ry: 70, fill: null, label: 'body' },
    // Head
    { type: 'ellipse', cx: cx + 100, cy: cy - 85, rx: 48, ry: 38, fill: null, label: 'head' },
    // Horn
    { type: 'triangle', points: [[cx+88, cy-118],[cx+105, cy-188],[cx+118, cy-118]], fill: null, label: 'horn' },
    // Mane
    { type: 'ellipse', cx: cx + 55, cy: cy - 60, rx: 30, ry: 65, rotation: 0.3, fill: null, label: 'mane' },
    // Legs
    { type: 'rect', x: cx - 80, y: cy + 55, w: 28, h: 80, fill: null, label: 'leg1' },
    { type: 'rect', x: cx - 40, y: cy + 58, w: 28, h: 80, fill: null, label: 'leg2' },
    { type: 'rect', x: cx + 10, y: cy + 58, w: 28, h: 80, fill: null, label: 'leg3' },
    { type: 'rect', x: cx + 50, y: cy + 55, w: 28, h: 80, fill: null, label: 'leg4' },
    // Tail
    { type: 'ellipse', cx: cx - 130, cy: cy - 10, rx: 35, ry: 55, rotation: -0.3, fill: null, label: 'tail' },
  ];
}

function drawUnicornOutline(ctx, W, H) {
  const cx = W/2, cy = H/2 + 30;
  ctx.strokeStyle = '#880e4f';
  ctx.lineWidth = 3;

  // Body
  ctx.beginPath(); ctx.ellipse(cx - 10, cy, 110, 70, 0, 0, Math.PI*2); ctx.stroke();
  // Neck
  ctx.beginPath(); ctx.ellipse(cx + 60, cy - 40, 30, 50, 0.3, 0, Math.PI*2); ctx.stroke();
  // Head
  ctx.beginPath(); ctx.ellipse(cx + 100, cy - 85, 48, 38, 0.15, 0, Math.PI*2); ctx.stroke();

  // Horn
  ctx.beginPath();
  ctx.moveTo(cx+88, cy-118); ctx.lineTo(cx+105, cy-188); ctx.lineTo(cx+118, cy-118);
  ctx.closePath(); ctx.stroke();
  // Horn stripes
  ctx.lineWidth = 1.5;
  for (let i = 1; i <= 4; i++) {
    const yy = cy - 118 - i * 14;
    const hw = 14 - i * 2.5;
    ctx.beginPath(); ctx.moveTo(cx+105-hw, yy); ctx.lineTo(cx+105+hw, yy); ctx.stroke();
  }

  ctx.lineWidth = 3;
  // Eye
  ctx.fillStyle = '#880e4f';
  ctx.beginPath(); ctx.ellipse(cx + 115, cy - 92, 7, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx + 118, cy - 95, 3, 0, Math.PI*2); ctx.fill();

  // Eyelashes
  ctx.lineWidth = 1.8;
  for (let i = 0; i < 3; i++) {
    const a = (-50 + i * 25) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + 115 + 10 * Math.cos(a), cy - 92 + 11 * Math.sin(a));
    ctx.lineTo(cx + 115 + 15 * Math.cos(a), cy - 92 + 16 * Math.sin(a));
    ctx.stroke();
  }

  // Mouth
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx + 130, cy - 76, 6, .1, Math.PI*.8); ctx.stroke();

  // Ear
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx+85, cy-112); ctx.lineTo(cx+78, cy-140); ctx.lineTo(cx+96, cy-115); ctx.closePath(); ctx.stroke();

  // Mane (wavy lines)
  ctx.lineWidth = 2.5;
  for (let m = 0; m < 5; m++) {
    ctx.beginPath();
    const sx = cx + 70 - m * 6;
    const sy = cy - 105 + m * 5;
    ctx.moveTo(sx, sy);
    for (let t = 0; t <= 10; t++) {
      const tt = t / 10;
      ctx.lineTo(sx - 15 - m * 3 + Math.sin(tt * Math.PI * 2) * 12, sy + tt * 75);
    }
    ctx.stroke();
  }

  // Legs
  ctx.lineWidth = 3;
  [[-80,55],[-40,58],[10,58],[50,55]].forEach(([lx,ly]) => {
    ctx.beginPath(); ctx.roundRect(cx+lx, cy+ly, 28, 80, 6); ctx.stroke();
    // Hoof
    ctx.beginPath(); ctx.roundRect(cx+lx-2, cy+ly+70, 32, 14, [0,0,6,6]); ctx.stroke();
  });

  // Tail (wavy)
  ctx.lineWidth = 2.5;
  for (let m = 0; m < 4; m++) {
    ctx.beginPath();
    ctx.moveTo(cx - 110, cy - 15 + m * 5);
    for (let t = 0; t <= 10; t++) {
      const tt = t / 10;
      ctx.lineTo(cx - 110 - tt * 55 + Math.sin(tt * Math.PI * 2.5) * 15, cy - 15 + m * 5 + tt * 45);
    }
    ctx.stroke();
  }

  // Cheek
  ctx.fillStyle = 'rgba(244,143,177,.3)';
  ctx.beginPath(); ctx.ellipse(cx + 135, cy - 80, 8, 5, 0, 0, Math.PI*2); ctx.fill();
}

// ============ CASTLE ============
function buildCastleRegions(W, H) {
  return [
    // Main wall
    { type: 'rect', x: 130, y: 160, w: 220, h: 250, fill: null, label: 'wall' },
    // Left tower
    { type: 'rect', x: 80, y: 100, w: 80, h: 310, fill: null, label: 'towerL' },
    // Right tower
    { type: 'rect', x: 320, y: 100, w: 80, h: 310, fill: null, label: 'towerR' },
    // Left roof
    { type: 'triangle', points: [[80,100],[120,20],[160,100]], fill: null, label: 'roofL' },
    // Right roof
    { type: 'triangle', points: [[320,100],[360,20],[400,100]], fill: null, label: 'roofR' },
    // Door
    { type: 'rect', x: 210, y: 320, w: 60, h: 90, fill: null, label: 'door' },
    // Window left
    { type: 'ellipse', cx: 180, cy: 240, rx: 22, ry: 28, fill: null, label: 'winL' },
    // Window right
    { type: 'ellipse', cx: 300, cy: 240, rx: 22, ry: 28, fill: null, label: 'winR' },
    // Flag L
    { type: 'triangle', points: [[120,20],[120,55],[155,37]], fill: null, label: 'flagL' },
    // Flag R
    { type: 'triangle', points: [[360,20],[360,55],[395,37]], fill: null, label: 'flagR' },
  ];
}

function drawCastleOutline(ctx, W, H) {
  ctx.strokeStyle = '#4a148c';
  ctx.lineWidth = 3;

  // Main wall
  ctx.beginPath(); ctx.rect(130, 160, 220, 250); ctx.stroke();
  // Battlements on main wall
  for (let i = 0; i < 5; i++) {
    ctx.beginPath(); ctx.rect(132 + i * 44, 145, 22, 18); ctx.stroke();
  }

  // Towers
  ctx.beginPath(); ctx.rect(80, 100, 80, 310); ctx.stroke();
  ctx.beginPath(); ctx.rect(320, 100, 80, 310); ctx.stroke();

  // Roofs
  ctx.beginPath(); ctx.moveTo(80,100); ctx.lineTo(120,20); ctx.lineTo(160,100); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(320,100); ctx.lineTo(360,20); ctx.lineTo(400,100); ctx.closePath(); ctx.stroke();

  // Flags
  ctx.beginPath(); ctx.moveTo(120,20); ctx.lineTo(120,55); ctx.lineTo(155,37); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(360,20); ctx.lineTo(360,55); ctx.lineTo(395,37); ctx.closePath(); ctx.stroke();
  // Flag poles
  ctx.beginPath(); ctx.moveTo(120,20); ctx.lineTo(120, 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(360,20); ctx.lineTo(360, 5); ctx.stroke();

  // Door
  ctx.beginPath();
  ctx.arc(240, 320, 30, Math.PI, 0);
  ctx.lineTo(270, 410);
  ctx.lineTo(210, 410);
  ctx.closePath();
  ctx.stroke();
  // Door handle
  ctx.beginPath(); ctx.arc(250, 370, 4, 0, Math.PI*2); ctx.stroke();

  // Windows
  ctx.beginPath(); ctx.ellipse(180, 240, 22, 28, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(300, 240, 22, 28, 0, 0, Math.PI*2); ctx.stroke();
  // Window crosses
  ctx.lineWidth = 2;
  [180, 300].forEach(wx => {
    ctx.beginPath(); ctx.moveTo(wx, 212); ctx.lineTo(wx, 268); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx-22, 240); ctx.lineTo(wx+22, 240); ctx.stroke();
  });

  // Tower windows
  ctx.lineWidth = 2.5;
  [120, 360].forEach(tx => {
    ctx.beginPath(); ctx.ellipse(tx, 180, 14, 18, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(tx, 300, 14, 18, 0, 0, Math.PI*2); ctx.stroke();
  });

  // Hearts on wall
  ctx.lineWidth = 2;
  drawHeartOutline(ctx, 240, 195, 12);
}

function drawHeartOutline(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * .3);
  ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * .3);
  ctx.bezierCurveTo(x - s, y + s * .7, x, y + s, x, y + s * 1.1);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * .7, x + s, y + s * .3);
  ctx.bezierCurveTo(x + s, y, x, y, x, y + s * .3);
  ctx.stroke();
}

// ============ RAINBOW ============
function buildRainbowRegions(W, H) {
  const cx = W/2, cy = H - 60;
  const colors = 7;
  const regions = [];
  // Each rainbow stripe as a region
  for (let i = 0; i < colors; i++) {
    regions.push({
      type: 'arc', cx: cx, cy: cy, r: 200 - i * 22, thickness: 20, fill: null, label: 'stripe' + i
    });
  }
  // Sun
  regions.push({ type: 'ellipse', cx: 80, cy: 80, rx: 50, ry: 50, fill: null, label: 'sun' });
  // Cloud left
  regions.push({ type: 'ellipse', cx: 100, cy: H - 85, rx: 60, ry: 35, fill: null, label: 'cloudL' });
  // Cloud right
  regions.push({ type: 'ellipse', cx: W - 100, cy: H - 85, rx: 60, ry: 35, fill: null, label: 'cloudR' });
  return regions;
}

function drawRainbowOutline(ctx, W, H) {
  const cx = W/2, cy = H - 60;
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 2.5;

  // Rainbow arcs
  for (let i = 0; i <= 7; i++) {
    const r = 200 - i * 22;
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, 0); ctx.stroke();
  }

  // Sun
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(80, 80, 50, 0, Math.PI*2); ctx.stroke();
  // Sun rays
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(80 + 55 * Math.cos(a), 80 + 55 * Math.sin(a));
    ctx.lineTo(80 + 72 * Math.cos(a), 80 + 72 * Math.sin(a));
    ctx.stroke();
  }
  // Sun face
  ctx.fillStyle = '#5d4037';
  ctx.beginPath(); ctx.arc(70, 74, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(90, 74, 4, 0, Math.PI*2); ctx.fill();
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(80, 84, 12, .1, Math.PI-.1); ctx.stroke();

  // Clouds
  ctx.lineWidth = 2.5;
  drawCloudOutline(ctx, 100, H - 85, 40);
  drawCloudOutline(ctx, W - 100, H - 85, 40);

  // Stars
  ctx.lineWidth = 2;
  drawStarOutline(ctx, W - 70, 60, 18);
  drawStarOutline(ctx, W - 120, 120, 12);
  drawStarOutline(ctx, 170, 50, 14);
}

function drawCloudOutline(ctx, x, y, s) {
  ctx.beginPath();
  ctx.arc(x - s * .5, y, s * .6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + s * .5, y, s * .6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y - s * .3, s * .7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y + s * .1, s * .5, 0, Math.PI * 2);
  ctx.stroke();
}

function drawStarOutline(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 72 - 90) * Math.PI / 180;
    const a2 = ((i * 72) + 36 - 90) * Math.PI / 180;
    ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    ctx.lineTo(cx + r * .4 * Math.cos(a2), cy + r * .4 * Math.sin(a2));
  }
  ctx.closePath();
  ctx.stroke();
}

// ============ GAME ENGINE ============

const canvas = document.getElementById('artCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const pictures = makePictures();
let currentPicture = 0;
let undoStack = [];

// Build palette
const paletteEl = document.getElementById('palette');
COLORS.forEach((c, i) => {
  const btn = document.createElement('div');
  btn.className = 'color-btn' + (i === 0 ? ' active' : '');
  btn.style.background = c.hex;
  if (c.hex === '#ffffff') btn.style.border = '3px solid #ccc';
  btn.title = c.name;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = c.hex;
    isEraser = false;
    document.getElementById('btnEraser').style.opacity = '1';
  });
  paletteEl.appendChild(btn);
});

// Tools
document.getElementById('btnEraser').addEventListener('click', () => {
  isEraser = true;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnEraser').style.opacity = '.6';
});

document.getElementById('btnUndo').addEventListener('click', () => {
  const pic = pictures[currentPicture];
  if (undoStack.length > 0) {
    const last = undoStack.pop();
    pic.regions[last.index].fill = last.prevColor;
    render();
  }
});

document.getElementById('btnClear').addEventListener('click', () => {
  const pic = pictures[currentPicture];
  pic.regions.forEach(r => r.fill = null);
  undoStack = [];
  render();
  document.getElementById('sparkleText').classList.remove('show');
});

document.getElementById('btnNext').addEventListener('click', () => {
  currentPicture = (currentPicture + 1) % pictures.length;
  undoStack = [];
  document.getElementById('sparkleText').classList.remove('show');
  render();
  updateProgress();
});

// Click / tap to fill
canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;
  fillAtPoint(x, y);
});

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  fillAtPoint(x, y);
}

function fillAtPoint(x, y) {
  const pic = pictures[currentPicture];
  // Check regions in reverse order (top regions first)
  for (let i = pic.regions.length - 1; i >= 0; i--) {
    if (hitTest(pic.regions[i], x, y)) {
      const prevColor = pic.regions[i].fill;
      pic.regions[i].fill = isEraser ? null : currentColor;
      undoStack.push({ index: i, prevColor });
      playSound();
      render();
      checkComplete();
      return;
    }
  }
}

function hitTest(region, x, y) {
  if (region.type === 'ellipse') {
    const rot = region.rotation || 0;
    const cos = Math.cos(-rot), sin = Math.sin(-rot);
    const dx = x - region.cx, dy = y - region.cy;
    const rx = cos * dx - sin * dy;
    const ry = sin * dx + cos * dy;
    return (rx * rx) / (region.rx * region.rx) + (ry * ry) / (region.ry * region.ry) <= 1;
  }
  if (region.type === 'rect') {
    return x >= region.x && x <= region.x + region.w && y >= region.y && y <= region.y + region.h;
  }
  if (region.type === 'triangle') {
    return pointInTriangle(x, y, region.points[0], region.points[1], region.points[2]);
  }
  if (region.type === 'arc') {
    const dx = x - region.cx, dy = y - region.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const inner = region.r - region.thickness;
    return dist >= inner && dist <= region.r && dy <= 0;
  }
  return false;
}

function pointInTriangle(px, py, a, b, c) {
  const d1 = sign(px, py, a[0], a[1], b[0], b[1]);
  const d2 = sign(px, py, b[0], b[1], c[0], c[1]);
  const d3 = sign(px, py, c[0], c[1], a[0], a[1]);
  const hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
  const hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);
  return !(hasNeg && hasPos);
}

function sign(px, py, x1, y1, x2, y2) {
  return (px - x2) * (y1 - y2) - (x1 - x2) * (py - y2);
}

function checkComplete() {
  const pic = pictures[currentPicture];
  const allFilled = pic.regions.every(r => r.fill !== null);
  if (allFilled) {
    document.getElementById('sparkleText').classList.add('show');
  }
}

// ============ RENDERING ============

function render() {
  const pic = pictures[currentPicture];

  // Background
  ctx.fillStyle = pic.bgColor;
  ctx.fillRect(0, 0, W, H);

  // Draw filled regions
  pic.regions.forEach(region => {
    if (region.fill) {
      ctx.fillStyle = region.fill;
      if (region.type === 'ellipse') {
        ctx.beginPath();
        ctx.ellipse(region.cx, region.cy, region.rx, region.ry, region.rotation || 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (region.type === 'rect') {
        ctx.beginPath();
        ctx.roundRect(region.x, region.y, region.w, region.h, 4);
        ctx.fill();
      } else if (region.type === 'triangle') {
        ctx.beginPath();
        ctx.moveTo(region.points[0][0], region.points[0][1]);
        ctx.lineTo(region.points[1][0], region.points[1][1]);
        ctx.lineTo(region.points[2][0], region.points[2][1]);
        ctx.closePath();
        ctx.fill();
      } else if (region.type === 'arc') {
        ctx.beginPath();
        ctx.arc(region.cx, region.cy, region.r, Math.PI, 0);
        ctx.arc(region.cx, region.cy, region.r - region.thickness, 0, Math.PI, true);
        ctx.closePath();
        ctx.fill();
      }
    }
  });

  // Draw outline on top
  pic.drawOutline(ctx);

  // Update label
  document.getElementById('pictureLabel').textContent = pic.label;
}

function updateProgress() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  pictures.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentPicture ? ' done' : '') + (i === currentPicture ? ' current' : '');
    dots.appendChild(d);
  });
}

// Sound
function playSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    gain.gain.value = .08;
    osc.frequency.value = 400 + Math.random() * 300;
    osc.type = 'sine';
    osc.start();
    gain.gain.linearRampToValueAtTime(0, ac.currentTime + .15);
    osc.stop(ac.currentTime + .15);
  } catch(e) {}
}

// Floating decorations
const floatEmojis = ['🎨','🖌️','⭐','🌸','🦋','✨','🌈','💖'];
setInterval(() => {
  if (document.querySelectorAll('.floater').length > 6) return;
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = '105vh';
  el.style.animationDuration = (7 + Math.random() * 6) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 16000);
}, 3000);

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r,r,r,r];
    if (!Array.isArray(r)) r = [5,5,5,5];
    const [tl,tr,br,bl] = r;
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);
    this.quadraticCurveTo(x+w,y,x+w,y+tr);
    this.lineTo(x+w,y+h-br);
    this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
    this.lineTo(x+bl,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-bl);
    this.lineTo(x,y+tl);
    this.quadraticCurveTo(x,y,x+tl,y);
    this.closePath();
  };
}

// Init
updateProgress();
render();
</script>
